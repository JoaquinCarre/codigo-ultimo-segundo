<!DOCTYPE html>

<head>

<style>

:root{

body{background:var(--bg);color:var(--txt);font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden;font-size:105%;}

.wrap{max-width:1200px;margin:0 auto;padding:14px;}
.hdr{text-align:center;padding:18px 0 10px;border-bottom:1px solid var(--bor);margin-bottom:14px;}
.title{font-family:'Orbitron',monospace;font-size:clamp(17px,4vw,32px);font-weight:900;color:var(--g);letter-spacing:4px;text-shadow:0 0 20px var(--gd);}
.sub{font-size:11px;color:var(--txd);letter-spacing:3px;margin-top:4px;}
.panel{background:var(--bg2);border:1px solid var(--bor);border-radius:4px;padding:11px 13px;}
.ptitle{font-family:'Orbitron',monospace;font-size:9px;color:var(--txd);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;border-bottom:1px solid var(--bor);padding-bottom:5px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}

.tbar{background:var(--bg3);border:1px solid var(--bor);border-radius:4px;padding:10px 14px;display:flex;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap;}

.tcnt{font-family:'Orbitron',monospace;font-size:17px;font-weight:700;min-width:38px;text-align:right;}
.card{width:46px;height:62px;border-radius:4px;border:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-family:'Share Tech Mono',monospace;font-weight:bold;transition:transform .1s,border-color .15s,box-shadow .15s;user-select:none;flex-shrink:0;}

.card.selected{border-color:#fff!important;transform:translateY(-6px);box-shadow:0 0 8px rgba(255,255,255,0.3);}

.card.green{background:rgba(0,200,100,.12);border-color:var(--gd);color:var(--g);}
.card.blue{background:rgba(0,170,255,.15);border-color:var(--bd);color:var(--b);}
.card.white{background:rgba(224,255,232,.08);border-color:rgba(224,255,232,.4);color:var(--w);}
.card.fault{background:rgba(255,100,0,.15);border-color:#ff6600;color:#ff6600;}
.card.bomb-c{background:rgba(255,0,60,.2);border-color:var(--r);color:var(--r);}
.card.special-c{background:rgba(255,0,200,.15);border-color:#ff00cc;color:#ff88ee;}
.cicon{font-size:16px;line-height:1;}
.clbl{font-size:7px;letter-spacing:.5px;margin-top:2px;opacity:.8;text-align:center;line-height:1.2;}
.cback{width:46px;height:62px;border-radius:4px;border:1px solid var(--bor);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--bor);flex-shrink:0;cursor:pointer;transition:border-color .15s;}
.cback.sel{border:2px solid var(--g);background:rgba(0,255,136,.08);}
.cback:hover{border-color:var(--gd);}
.hand{display:flex;flex-wrap:wrap;gap:5px;min-height:62px;align-items:flex-start;}
.btn{background:transparent;border:1px solid var(--gd);color:var(--g);font-family:'Share Tech Mono',monospace;font-size:11px;padding:7px 13px;border-radius:2px;cursor:pointer;letter-spacing:1px;transition:background .15s,border-color .15s;text-transform:uppercase;}

.brow{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}

.discard-box{background:rgba(255,150,0,.08);border:1px solid #ff9900;border-radius:4px;padding:10px 14px;font-size:12px;color:#ff9900;margin-bottom:10px;line-height:1.7;}
.fault-box{background:rgba(255,100,0,.1);border:1px solid #ff6600;border-radius:4px;padding:11px 15px;font-size:12px;color:#ff8844;margin-bottom:10px;line-height:1.7;}

.lobby-panel{background:var(--bg2);border:1px solid var(--bor);border-radius:4px;padding:20px;margin-bottom:14px;}
.lobby{max-width:520px;margin:30px auto;padding:0 16px;}
.room-code{font-family:'Orbitron',monospace;font-size:32px;font-weight:900;color:var(--g);letter-spacing:8px;text-align:center;padding:16px;background:var(--bg3);border:1px solid var(--bor);border-radius:4px;margin:10px 0;cursor:pointer;}
.room-code:hover{border-color:var(--gd);}
.player-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border:1px solid var(--bor);border-radius:4px;font-size:12px;margin-bottom:6px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.on{background:var(--g);}.dot.off{background:var(--rd);}
.hint-input{background:var(--bg3);border:1px solid var(--gd);color:var(--g);font-family:'Share Tech Mono',monospace;font-size:14px;padding:8px 12px;border-radius:2px;flex:1;outline:none;}
.hint-input:focus{border-color:var(--g);}
.spec-badge{background:rgba(0,170,255,.1);border:1px solid var(--bd);color:var(--b);padding:2px 7px;border-radius:2px;font-size:9px;font-family:'Orbitron',monospace;letter-spacing:1px;}
.pass-box{background:rgba(0,255,136,.05);border:1px solid var(--gd);border-radius:4px;padding:10px 14px;font-size:12px;color:var(--g);margin-bottom:10px;line-height:1.7;}
.card.pass-hi{border-color:var(--orange)!important;box-shadow:0 0 8px rgba(255,153,0,.4);}

/* ── LOBBY ── */
.lobby-panel{background:var(--bg2);border:1px solid var(--bor);border-radius:4px;padding:20px;margin-bottom:14px;}
.field{width:100%;background:var(--bg3);border:1px solid var(--gd);color:var(--g);font-family:'Share Tech Mono',monospace;font-size:14px;padding:8px 12px;border-radius:2px;outline:none;letter-spacing:1px;margin-bottom:8px;}
.field:focus{border-color:var(--g);box-shadow:0 0 6px rgba(0,255,136,.18);}
.field::placeholder{color:var(--txd);letter-spacing:0;}
.room-code{font-family:'Orbitron',monospace;font-size:clamp(22px,6vw,34px);font-weight:900;color:var(--g);letter-spacing:8px;text-align:center;padding:16px;background:var(--bg3);border:1px solid var(--bor);border-radius:4px;margin:10px 0;cursor:pointer;transition:border-color .15s;}
.room-code:hover{border-color:var(--gd);}
.player-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border:1px solid var(--bor);border-radius:4px;font-size:12px;margin-bottom:6px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.on{background:var(--g);}.dot.off{background:var(--rd);}
.hint-input{background:var(--bg3);border:1px solid var(--gd);color:var(--g);font-family:'Share Tech Mono',monospace;font-size:14px;padding:8px 12px;border-radius:2px;flex:1;outline:none;letter-spacing:1px;}
.hint-input:focus{border-color:var(--g);box-shadow:0 0 6px rgba(0,255,136,.18);}
.spec-badge{background:rgba(0,170,255,.1);border:1px solid var(--bd);color:var(--b);padding:2px 7px;border-radius:2px;font-size:9px;font-family:'Orbitron',monospace;letter-spacing:1px;}

</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="title">CÓDIGO: ÚLTIMO SEGUNDO</div>
    <div class="sub">DESACTIVACIÓN COOPERATIVA — 2 A 6 AGENTES</div>
  </div>
  <div id="root"></div>
</div>
<div id="modal-ov" class="modal-ov" style="display:none">
  <div class="modal">
    <div id="m-title" class="mtitle">—</div>
    <div id="m-msg" class="mmsg">—</div>
    <div id="m-btns" class="brow" style="justify-content:center;margin-top:10px"></div>
  </div>
</div>
<script>

// ─── CONSTANTES ──────────────────────────────────────────────────────────────
const CN={red:'Rojo',green:'Verde',blue:'Azul',white:'Comodín'};
const CI={red:'●',green:'●',blue:'●',white:'◉',fault:'⚡',bomb:'💣',special:'☢'};

// ─── TIPOS DE BOMBAS ─────────────────────────────────────────────────────────
const BOMB_DEFS=[
  // Básicas (3 cables) — max 1 azul
  {id:'A',tier:'basic',label:'BÁSICA A',reqs:{red:2,green:1},copies:5},
  {id:'B',tier:'basic',label:'BÁSICA B',reqs:{red:1,green:2},copies:4},
  {id:'C',tier:'basic',label:'BÁSICA C',reqs:{red:1,green:1,blue:1},copies:4},
  {id:'D',tier:'basic',label:'BÁSICA D',reqs:{red:2,blue:1},copies:3},
  {id:'E',tier:'basic',label:'BÁSICA E',reqs:{green:2,blue:1},copies:2},
  // Pesadas (4 cables) — max 1 azul
  {id:'F',tier:'heavy',label:'PESADA F',reqs:{red:2,green:2},copies:4},
  {id:'G',tier:'heavy',label:'PESADA G',reqs:{red:3,green:1},copies:3},
  {id:'H',tier:'heavy',label:'PESADA H',reqs:{red:1,green:3},copies:2},
  {id:'I',tier:'heavy',label:'PESADA I',reqs:{red:2,green:1,blue:1},copies:2},
  {id:'J',tier:'heavy',label:'PESADA J',reqs:{red:1,green:2,blue:1},copies:1},
];

// Especiales: 4 variantes por rango
const SPECIALS={
  s1:[  // 2-3J — 7 cables
    {id:'S1a',label:'ESPECIAL S1a',reqs:{red:4,green:2,blue:1},tier:'special'},
    {id:'S1b',label:'ESPECIAL S1b',reqs:{red:3,green:3,blue:1},tier:'special'},
    {id:'S1c',label:'ESPECIAL S1c',reqs:{red:3,green:2,blue:2},tier:'special'},
    {id:'S1d',label:'ESPECIAL S1d',reqs:{red:2,green:3,blue:2},tier:'special'},
  ],
  s2:[  // 4-5J — 13 cables
    {id:'S2a',label:'ESPECIAL S2a',reqs:{red:6,green:5,blue:2},tier:'special'},
    {id:'S2b',label:'ESPECIAL S2b',reqs:{red:5,green:5,blue:3},tier:'special'},
    {id:'S2c',label:'ESPECIAL S2c',reqs:{red:6,green:4,blue:3},tier:'special'},
    {id:'S2d',label:'ESPECIAL S2d',reqs:{red:5,green:4,blue:4},tier:'special'},
  ],
  s3:[  // 6J — 16 cables
    {id:'S3a',label:'ESPECIAL S3a',reqs:{red:7,green:6,blue:3},tier:'special'},
    {id:'S3b',label:'ESPECIAL S3b',reqs:{red:6,green:7,blue:3},tier:'special'},
    {id:'S3c',label:'ESPECIAL S3c',reqs:{red:7,green:5,blue:4},tier:'special'},
    {id:'S3d',label:'ESPECIAL S3d',reqs:{red:6,green:5,blue:5},tier:'special'},
  ],
};

// ─── CONSTRUCCIÓN DE MAZOS ────────────────────────────────────────────────────
function buildBombDeck(){
  let d=[];
  for(let def of BOMB_DEFS)
    for(let i=0;i<def.copies;i++)
      d.push({...def,reqs:{...def.reqs},type:'bomb',defused:false});
  return shuffle(d);
}

function buildCableDeck(n){
  let d=[];
  const add=(col,count,lbl)=>{for(let i=0;i<count;i++) d.push({color:col,label:lbl,type:'cable'});};
  // Base (2-4J): 30R + 28G + 16B + 2W = 76
  add('red',30,'Rojo'); add('green',28,'Verde'); add('blue',16,'Azul'); add('white',2,'Comodín');
  // Pack (5-6J): +8R +9G +3B
  if(n>=5){add('red',8,'Rojo');add('green',9,'Verde');add('blue',3,'Azul');}
  return shuffle(d);
}

function buildFaultCards(){
  return [
    {type:'fault',color:'fault',label:'FALLA',faultColor:'multi'},
    {type:'fault',color:'fault',label:'FALLA',faultColor:'multi'},
    {type:'fault',color:'fault',label:'FALLA',faultColor:'multi'},
    {type:'fault',color:'fault',label:'FALLA',faultColor:'multi'},
  ];
}

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

function pickSpecial(n){
  const pool=n<=3?SPECIALS.s1:n<=5?SPECIALS.s2:SPECIALS.s3;
  return {...pool[0|Math.random()*pool.length],reqs:{...pool[0].reqs},type:'special',defused:false};
}

// ─── HELPERS DE JUEGO ────────────────────────────────────────────────────────
function countCols(cards){
  let c={};
  for(let x of cards) if(x.type==='cable') c[x.color]=(c[x.color]||0)+1;
  return c;
}

function canDefuse(hand,bomb){
  let c=countCols(hand),w=c.white||0;
  for(let[col,n] of Object.entries(bomb.reqs)){
    let have=c[col]||0;
    if(have<n){let def=n-have;if(w>=def)w-=def;else return false;}
  }
  return true;
}

function neededCards(hand,bomb){
  let c=countCols(hand),res={};
  for(let[col,n] of Object.entries(bomb.reqs)){
    let have=Math.min(c[col]||0,n); res[col]=have;
    let def=n-have;
    if(def>0){let w=c.white||0;res.white=(res.white||0)+Math.min(def,w);}
  }
  return res;
}

function removeCards(hand,toRem){
  let rem=[...hand];
  for(let[col,n] of Object.entries(toRem)){
    let done=0;
    rem=rem.filter(c=>{if(done<n&&c.color===col&&c.type==='cable'){done++;return false;}return true;});
  }
  return rem;
}

function missingFor(hand,bomb){
  let c=countCols(hand),w=c.white||0,miss=0;
  for(let[col,n] of Object.entries(bomb.reqs)){
    let have=c[col]||0,def=Math.max(0,n-have);
    if(def>0){let use=Math.min(def,w);w-=use;miss+=def-use;}
  }
  return miss;
}

function reqHTML(bomb){
  return Object.entries(bomb.reqs).map(([c,n])=>`<span class="req ${c}">${n}×${c.substring(0,3).toUpperCase()}</span>`).join(' ');
}

function getCombos(n,k){
  let r=[];
  function c(s,cur){if(cur.length===k){r.push([...cur]);return;}for(let i=s;i<n;i++){cur.push(i);c(i+1,cur);cur.pop();}}
  c(0,[]);return r;
}

// ─── IA BRAIN ────────────────────────────────────────────────────────────────
function aiBrain(agent,G){
  const decisions=[];
  const timeUrgent=G.timeLeft<8;
  const simHand=[...agent.hand];
  const maxActions=3;
  let actUsed=0;

  function closestBomb(h){
    let best=null,bestM=999;
    if(!agent.bombDefused){let m=missingFor(h,agent.bomb);if(m<bestM){bestM=m;best={bomb:agent.bomb,personal:true};}}
    for(let i=0;i<G.publicBombs.length;i++){
      let b=G.publicBombs[i];
      if(b.defused)continue;
      let m=missingFor(h,b);if(m<bestM){bestM=m;best={bomb:b,personal:false,idx:i};}
    }
    if(G.specialBomb&&!G.specialBomb.defused){
      let m=missingFor(h,G.specialBomb);if(m<bestM){bestM=m;best={bomb:G.specialBomb,personal:false,isSpecial:true};}
    }
    return {target:best,missing:bestM};
  }

  // 1. Rojo si tiempo urgente
  if(timeUrgent&&actUsed<maxActions){
    let ri=simHand.findIndex(c=>c.color==='red'&&c.type==='cable');
    if(ri>=0){decisions.push({type:'effect',color:'red',msg:'[IA] Tiempo crítico — usa Rojo.'});simHand.splice(ri,1);actUsed++;}
  }

  // 2. Verde si mano chica
  if(simHand.length<=3&&actUsed<maxActions){
    let gi=simHand.findIndex(c=>c.color==='green'&&c.type==='cable');
    if(gi>=0){decisions.push({type:'effect',color:'green',msg:'[IA] Mano baja — usa Verde para robar 2.'});simHand.splice(gi,1);actUsed++;}
  }

  // 3. Azul si muchas bombas pendientes
  if(!timeUrgent&&actUsed<maxActions){
    let pendB=G.gameDeck.filter(c=>c.type==='bomb'||c.type==='special').length;
    let bi=simHand.findIndex(c=>c.color==='blue'&&c.type==='cable');
    if(bi>=0&&pendB>=2){decisions.push({type:'effect',color:'blue',msg:'[IA] Usa Azul — explora el mazo.'});simHand.splice(bi,1);actUsed++;}
  }

  // 4. Desactivar si puede
  let{target}=closestBomb(simHand);
  if(target&&canDefuse(simHand,target.bomb)&&actUsed<maxActions){
    if(target.personal) decisions.push({type:'defuse_personal',msg:'[IA] Desactiva bomba personal.'});
    else if(target.isSpecial) decisions.push({type:'defuse_special',msg:'[IA] Desactiva Bomba Especial!'});
    else decisions.push({type:'defuse_public',idx:target.idx,msg:'[IA] Desactiva bomba pública.'});
    actUsed++;
  }

  return decisions;
}

function aiCrisisDecide(agent,bomb,G){
  if(canDefuse(agent.hand,bomb)) return{attempt:true,steal:[],alone:true,msg:'[IA] Puede desactivar sola.'};
  for(let p of G.players){
    if(p.id===agent.id)continue;
    for(let take=1;take<=2;take++){
      for(let combo of getCombos(p.hand.length,take)){
        let combined=[...agent.hand,...combo.map(i=>p.hand[i])];
        if(canDefuse(combined,bomb)) return{attempt:true,steal:combo,stealFrom:p.id,msg:`[IA] Roba ${take} carta(s) a ciegas.`};
      }
    }
  }
  if(G.timeLeft>8) return{attempt:false,steal:[],msg:'[IA] No puede — adopta la bomba.'};
  return{attempt:true,steal:[],alone:true,msg:'[IA] Intento desesperado.'};
}

// ─── ESTADO ──────────────────────────────────────────────────────────────────
let G={};
let aiThinking=false;
let appLog=[];   // shared log array — declared here so both base game and MP layer can access it

function goSetup(){

  document.getElementById('root').innerHTML=`

function startGame(n){
  let bombs=buildBombDeck();
  let cables=buildCableDeck(n);

  // Bombas personales
  let players=[];
  for(let i=0;i<n;i++)
    players.push({id:i,name:i===0?'JUGADOR':`IA-${i}`,isHuman:i===0,bomb:bombs.shift(),bombDefused:false,hand:[]});

  // Bombas públicas: n+1 al mazo
  let numPub=n+1;
  let pubQueue=[];
  for(let i=0;i<numPub;i++) pubQueue.push(bombs.shift());

  // Mazo de tiempo: bombas sobrantes
  let timeDeck=[...bombs];

  // Mazo de juego: cables
  let gameDeck=[...cables];

  // Insertar bombas públicas en posiciones aleatorias (mín 4 del inicio)
  for(let b of pubQueue){
    let pos=Math.floor(Math.random()*(gameDeck.length-4)+4);
    gameDeck.splice(pos,0,b);
  }

  // Repartir manos (4 cartas) ANTES de insertar fallas y especial
  for(let p of players)
    for(let i=0;i<4;i++) p.hand.push(gameDeck.shift());

  // Fallas: 4 cartas, distribuidas al azar (mín 3 del inicio)
  let faults=buildFaultCards();
  let faultSpacing=Math.floor(gameDeck.length/(faults.length+1));
  for(let i=0;i<faults.length;i++){
    let pos=faultSpacing*(i+1)+Math.floor((Math.random()-0.5)*Math.max(1,faultSpacing/3));
    pos=Math.max(3,Math.min(gameDeck.length-1,pos));
    gameDeck.splice(pos,0,faults[i]);
  }

  // Bomba Especial: en el 65-75% del mazo
  let special=pickSpecial(n);
  let spMin=Math.floor(gameDeck.length*0.65);
  let spMax=Math.floor(gameDeck.length*0.75);
  let spPos=spMin+Math.floor(Math.random()*(spMax-spMin));
  gameDeck.splice(spPos,0,special);

  G={
    numPlayers:n, players,
    maxHand:8,
    currentTurn:0,
    phase:'action',    // action | draw | hint | clock
    actionsDone:0,
    maxActions:3,
    skipClock:false,   // set true if Red used
    gameDeck, timeDeck,
    timeLeft:timeDeck.length,
    clockDouble:false, // true after Special bomb fails
    discard:[],
    publicBombs:[],
    specialBomb:null,
    specialFailed:false,
    log:[],
    // Crisis
    crisisMode:false,crisisBomb:null,crisisStealer:0,
    crisisOwnSelected:[],selectedCards:[],
    // Fault
    faultMode:null,faultRound:false,
    faultOrder:[],faultRoundIdx:0,faultContrib:[],
    faultPending:0,faultSelected:[],
    faultConsult:false,faultConsultColor:null,
    faultConsultReplies:[],faultConsultDone:false,
    faultDrawerHasCards:true, // if false → instant fail
    // Hint
    hintMode:false,hintText:'',
    hints:[],  // [{playerName, text}]
    // Green effect
    greenMode:false,greenSelected:[],greenTargets:[],
    // Discard
    discardMode:false,discardCount:0,discardSelected:[],
    gameOver:false,
  };

  log('SISTEMA INICIADO — '+n+' agentes.','lo');
  log('Colores se anuncian solo al salir una bomba del mazo.','lw');
  log('Turno: Acciones (1-3) → Robo → Pista → Reloj.','le');
  render();
}

function log(msg,cls='le'){G.log.unshift({msg,cls});if(G.log.length>50)G.log.pop();}
function cur(){return G.players[G.currentTurn];}

// ─── WIN / LOSE ──────────────────────────────────────────────────────────────
function checkWin(){
  if(!G.players.every(p=>p.bombDefused)) return false;
  if(G.publicBombs.some(b=>!b.defused)) return false;
  if(!G.specialBomb||!G.specialBomb.defused) return false;
  endGame('win','¡MISIÓN CUMPLIDA!','Todas las amenazas neutralizadas. El equipo sobrevivió.');
  return true;
}

function endGame(type,title,msg){
  G.gameOver=true;
  document.getElementById('m-title').className='mtitle '+type;
  document.getElementById('m-title').textContent=title;
  document.getElementById('m-msg').textContent=msg;
  document.getElementById('modal-ov').style.display='flex';
}

function tickTime(n=1){
  let ticks=n*(G.clockDouble?2:1);
  for(let i=0;i<ticks;i++) if(G.timeDeck.length>0) G.discard.push(G.timeDeck.pop());
  G.timeLeft=G.timeDeck.length;
  if(G.timeLeft<=0) endGame('lose','EXPLOSIÓN CATASTRÓFICA','El tiempo se agotó.');
}

// ─── INPUT DEL JUGADOR ───────────────────────────────────────────────────────
function selectCard(idx){
  if(G.gameOver||aiThinking) return;
  // Fault round
  if(G.faultRound){
    let hId=G.players.find(p=>p.isHuman).id;
    if(G.faultOrder[G.faultRoundIdx]!==hId) return;
    let p=G.players[hId],card=p.hand[idx];
    if(!card||card.type!=='cable') return;
    if(G.faultSelected.length===0){G.faultSelected.push(idx);}
    else{
      let first=p.hand[G.faultSelected[0]];
      if(!first||card.color!==first.color){log('Mismo color para la falla.','lw');render();return;}
      let i=G.faultSelected.indexOf(idx);
      if(i>=0) G.faultSelected.splice(i,1);
      else if(G.faultSelected.length<G.faultPending) G.faultSelected.push(idx);
    }
    render();return;
  }
  // Crisis — selección propia
  if(G.crisisMode&&G.crisisStealer===G.players.find(p=>p.isHuman)?.id){
    let card=G.players.find(p=>p.isHuman).hand[idx];
    if(!card||card.type==='fault'||card.type==='bomb'||card.type==='special') return;
    let i=G.crisisOwnSelected.indexOf(idx);
    if(i>=0) G.crisisOwnSelected.splice(i,1);
    else G.crisisOwnSelected.push(idx);
    render();return;
  }
  if(!cur().isHuman) return;
  if(G.discardMode){discardSelectCard(idx);return;}
  if(G.greenMode){greenSelectCard(idx);return;}
  if(G.phase!=='action') return;
  let i=G.selectedCards.indexOf(idx);
  if(i>=0) G.selectedCards.splice(i,1);
  else G.selectedCards.push(idx);
  render();
}

function selectAICard(idx){
  if(!G.crisisMode||G.gameOver||aiThinking) return;
  let i=G.selectedCards.indexOf(idx);
  if(i>=0) G.selectedCards.splice(i,1);
  else if(G.selectedCards.length<2) G.selectedCards.push(idx);
  render();
}

// ─── ACCIONES ────────────────────────────────────────────────────────────────
function doDefusePersonal(){
  let p=cur();
  if(G.phase!=='action'||p.bombDefused||G.actionsDone>=G.maxActions) return;
  if(!canDefuse(p.hand,p.bomb)){log('Cables insuficientes.','lw');render();return;}
  p.hand=removeCards(p.hand,neededCards(p.hand,p.bomb));
  p.bombDefused=true;G.actionsDone++;G.selectedCards=[];
  log('¡BOMBA PERSONAL DESACTIVADA!','lo');
  checkWin();render();
}

function doDefusePublic(idx){
  let p=cur(),b=G.publicBombs[idx];
  if(G.phase!=='action'||!b||b.defused||G.actionsDone>=G.maxActions) return;
  if(!canDefuse(p.hand,b)){log('Cables insuficientes.','lw');render();return;}
  p.hand=removeCards(p.hand,neededCards(p.hand,b));
  b.defused=true;G.actionsDone++;G.selectedCards=[];
  log('¡BOMBA PÚBLICA DESACTIVADA!','lo');
  checkWin();render();
}

function doDefuseSpecial(){
  let p=cur(),b=G.specialBomb;
  if(G.phase!=='action'||!b||b.defused||G.actionsDone>=G.maxActions) return;
  if(!canDefuse(p.hand,b)){log('Cables insuficientes para la Especial.','lw');render();return;}
  p.hand=removeCards(p.hand,neededCards(p.hand,b));
  b.defused=true;G.actionsDone++;G.selectedCards=[];G.clockDouble=false;
  log('☢ ¡¡BOMBA ESPECIAL DESACTIVADA!! ¡VICTORIA AL ALCANCE!','lm');
  if(!checkWin()) render();
}

function doUseEffect(){
  if(G.phase!=='action'||G.actionsDone>=G.maxActions) return;
  let p=cur();
  if(G.selectedCards.length===0){log('Seleccioná una carta.','lw');render();return;}
  let idx=G.selectedCards[0],card=p.hand[idx];
  if(!card||card.type!=='cable'||card.color==='white'){log('El Comodín solo sirve para desactivar bombas.','lw');render();return;}
  p.hand.splice(idx,1);G.selectedCards=[];G.actionsDone++;
  applyEffect(card,p,true);
}

function applyEffect(card,agent,isHuman){
  if(card.color==='red'){
    G.skipClock=true;
    log(`[${agent.name}] 🔴 Rojo — el reloj no avanza este turno.`,'lo');
  } else if(card.color==='green'){
    if(isHuman){
      // Roba 2 del mazo
      let drawn=G.gameDeck.splice(0,2);
      let bombs=drawn.filter(c=>c.type==='bomb');
      let faults=drawn.filter(c=>c.type==='fault');
      let specials=drawn.filter(c=>c.type==='special');
      let cables=drawn.filter(c=>c.type==='cable');
      agent.hand.push(...cables);
      capHand(agent);
      log(`[${agent.name}] 🟢 Verde — roba 2 cartas.`,'lo');
      if(specials.length>0){
        // Special bomb appears during action phase
        let b=specials[0];
        G.specialBomb=b;
        log('☢ Bomba Especial robada con Verde — crisis inmediata.','lm');
        startCrisis(b,agent.id);
        return;
      }
      if(bombs.length>0){
        log('⚠️ Bomba con Verde — crisis activada.','lb');
        announceColors();
        startCrisis(bombs[0],agent.id);
        return;
      }
      if(faults.length>0){
        log('⚠️ Falla con Verde — ronda de falla inmediata.','lw');
        startFaultRound(faults[0],agent.id,true);
        return;
      }
    } else {
      doAIGreenEffect(agent);
    }
  } else if(card.color==='blue'){
    let top3=G.gameDeck.slice(0,3).map(c=>c.label||c.color).join(', ');
    log(`[${agent.name}] 🔵 Azul — próximas 3: ${top3}`,'li');
  }
  render();
}

function doAIGreenEffect(agent){
  let drawn=G.gameDeck.splice(0,2);
  let bombs=drawn.filter(c=>c.type==='bomb'||c.type==='special');
  let cables=drawn.filter(c=>c.type==='cable');
  agent.hand.push(...cables);
  capHand(agent);
  log(`[${agent.name}] 🟢 Verde — roba 2.`,'li');
  if(bombs.length>0){
    let b=bombs[0];
    if(b.type==='special') G.specialBomb=b;
    log('⚠️ Bomba con Verde (IA) — crisis.','lb');
    announceColors();
    startCrisis(b,agent.id);
  }
}

function capHand(agent){
  if(agent.hand.length>G.maxHand) agent.hand=agent.hand.slice(0,G.maxHand);
}

function announceColors(){
  for(let pl of G.players){
    let cnt=countCols(pl.hand);
    let cols=Object.keys(cnt).filter(c=>cnt[c]>0).map(c=>CN[c]||c).join(', ')||'ninguno';
    log(`${pl.name}: ${cols}`,'li');
  }
}

function doSkipToDraw(){G.selectedCards=[];G.phase='draw';render();}

// ─── ROBO ────────────────────────────────────────────────────────────────────
function doDrawCard(){
  if(G.phase!=='draw') return;
  if(G.gameDeck.length===0){endGame('lose','SISTEMA COLAPSADO','El mazo se agotó.');return;}
  let card=G.gameDeck.shift(),p=cur();
  log(`${p.name} roba: ${card.label||card.color}`,'le');

  if(card.type==='fault'){startFaultRound(card,G.currentTurn,false);return;}

  if(card.type==='special'){
    G.specialBomb=card;
    announceColors();
    log('☢ ¡BOMBA ESPECIAL REVELADA!','lm');
    startCrisis(card,G.currentTurn);
    return;
  }

  if(card.type==='bomb'){
    announceColors();
    startCrisis(card,G.currentTurn);
    return;
  }

  p.hand.push(card);
  // Check if over maxHand
  if(p.hand.length>G.maxHand){
    G.discardMode=true;
    G.discardCount=p.hand.length-G.maxHand;
    G.discardSelected=[];
    log(`Mano llena (${p.hand.length}/${G.maxHand}) — elegí ${G.discardCount} carta(s) para descartar.`,'lw');
    render();return;
  }
  G.phase='hint';render();
}

// ─── DESCARTE ────────────────────────────────────────────────────────────────
function discardSelectCard(idx){
  if(!G.discardMode) return;
  let i=G.discardSelected.indexOf(idx);
  if(i>=0) G.discardSelected.splice(i,1);
  else if(G.discardSelected.length<G.discardCount) G.discardSelected.push(idx);
  render();
}

function doConfirmDiscard(){
  if(G.discardSelected.length<G.discardCount){log(`Elegí ${G.discardCount} carta(s).`,'lw');render();return;}
  let p=cur();
  let idxs=[...G.discardSelected].sort((a,b)=>b-a);
  for(let i of idxs) G.discard.push(p.hand.splice(i,1)[0]);
  log(`Descartaste ${idxs.length} carta(s).`,'le');
  G.discardMode=false;G.discardCount=0;G.discardSelected=[];
  G.phase='hint';render();
}

// ─── PISTA VERBAL ────────────────────────────────────────────────────────────
function doSubmitHint(){
  if(G.phase!=='hint') return;
  let txt=G.hintText.trim();
  if(!txt){log('Ingresá una palabra como pista.','lw');render();return;}
  let words=txt.split(/\s+/);
  if(words.length>1){log('Solo una palabra.','lw');render();return;}
  let p=cur();
  G.hints.push({playerName:p.name,text:txt});
  if(G.hints.length>10) G.hints.shift();
  log(`${p.name} dice: "${txt}"`, 'lo');
  G.hintText='';G.phase='clock';render();
}

function doSkipHint(){
  // Allowed if fault/bomb interrupted (no hint rule)
  G.hintText='';G.phase='clock';render();
}

function updateHintText(val){G.hintText=val;}

// ─── RELOJ ───────────────────────────────────────────────────────────────────
function doAdvanceClock(){
  if(G.phase!=='clock') return;
  if(G.skipClock){
    G.skipClock=false;
    log('🔴 Reloj congelado este turno.','lo');
  } else {
    let ticks=G.clockDouble?2:1;
    tickTime(1);
    if(G.gameOver) return;
    log(`Reloj: ${G.timeLeft} seg.${G.clockDouble?' (×2!)':''}`,'le');
  }
  G.phase='action';G.actionsDone=0;G.selectedCards=[];G.skipClock=false;
  advanceTurn();
}

// ─── FALLA ───────────────────────────────────────────────────────────────────
function startFaultRound(fault,drawerIdx,fromEffect){
  G.faultMode=fault;G.faultRound=true;G.faultPending=3;
  G.faultContrib=[];G.faultSelected=[];G.faultFromEffect=fromEffect||false;
  G.faultConsult=false;G.faultConsultColor=null;G.faultConsultReplies=[];G.faultConsultDone=false;
  G.faultOrder=[];
  for(let i=0;i<G.numPlayers;i++) G.faultOrder.push((drawerIdx+i)%G.numPlayers);
  G.faultRoundIdx=0;

  let drawer=G.players[drawerIdx];
  // Check if drawer has cards
  let drawerCables=drawer.hand.filter(c=>c.type==='cable');
  if(drawerCables.length===0){
    log(`⚡ FALLA — ${drawer.name} no tiene cartas. Activación inmediata. −4 segundos.`,'lb');
    tickTime(4);if(G.gameOver)return;
    endFaultRound(false,drawerIdx);
    return;
  }

  log('⚡ FALLA — el equipo debe aportar 3 cables del mismo color.','lw');
  log(`Orden: ${G.faultOrder.map(i=>G.players[i].name).join(' → ')}. El primero elige el color.`,'lw');

  let first=G.players[G.faultOrder[0]];
  if(first.isHuman){
    G.faultConsult=true;
    render();
  } else {
    render();
    setTimeout(()=>faultAIContrib(),600);
  }
}

function doFaultAsk(color){
  if(!G.faultConsult||G.faultConsultDone) return;
  G.faultConsultColor=color;G.faultConsultReplies=[];
  log(`JUGADOR pregunta: "¿Alguien tiene ${CN[color]||color}?"`,'lw');
  for(let pl of G.players){
    if(pl.isHuman)continue;
    let cnt=countCols(pl.hand);
    let have=cnt[color]||0;
    let maxHave=Math.max(0,...Object.entries(cnt).filter(([c])=>c!=='white').map(([,n])=>n));
    let yes=have>0&&have>=maxHave;
    G.faultConsultReplies.push({name:pl.name,color,yes});
    log(`[${pl.name}] ${yes?'✓ SÍ':'✗ NO'}`,  'li');
  }
  G.faultConsultDone=true;render();
}

function doFaultSkipConsult(){G.faultConsult=false;G.faultConsultDone=false;G.faultConsultColor=null;G.faultConsultReplies=[];render();}

function doFaultContrib(){
  let hId=G.players.find(p=>p.isHuman).id;
  if(G.faultOrder[G.faultRoundIdx]!==hId) return;
  G.faultConsult=false;G.faultConsultDone=false;
  let p=G.players[hId];
  let sel=G.faultSelected.map(i=>p.hand[i]).filter(Boolean);
  if(sel.length>0&&!sel.every(c=>c.color===sel[0].color)){log('Mismo color.','lw');render();return;}
  // Drawer must contribute at least 1 if first
  if(G.faultRoundIdx===0&&sel.length===0){log('El primero debe aportar al menos 1 carta.','lw');render();return;}
  let idxs=[...G.faultSelected].sort((a,b)=>b-a);
  for(let i of idxs) G.discard.push(p.hand.splice(i,1)[0]);
  G.faultContrib.push({playerId:hId,count:sel.length});
  G.faultPending-=sel.length;
  G.faultSelected=[];
  log(`${p.name} aporta ${sel.length} cable(s) — faltan ${G.faultPending}.`,'lo');
  advanceFaultRound();
}

function doFaultPass(){
  let hId=G.players.find(p=>p.isHuman).id;
  if(G.faultOrder[G.faultRoundIdx]!==hId) return;
  // Drawer cannot pass (must contribute ≥1)
  if(G.faultRoundIdx===0){log('El primero debe aportar al menos 1 carta. Si no tenés, pasa a Cortocircuito.','lw');render();return;}
  G.faultConsult=false;G.faultConsultDone=false;
  G.faultContrib.push({playerId:hId,count:0});
  G.faultSelected=[];
  log(`${G.players[hId].name} pasa (0).`,'le');
  advanceFaultRound();
}

function advanceFaultRound(){
  if(G.faultPending<=0){log('¡FALLA NEUTRALIZADA!','lo');endFaultRound(true,G.faultOrder[0]);return;}
  G.faultRoundIdx++;
  if(G.faultRoundIdx>=G.faultOrder.length){
    log(`Falla no resuelta — solo ${3-G.faultPending}/3 cables. −4 segundos.`,'lb');
    endFaultRound(false,G.faultOrder[0]);return;
  }
  let next=G.players[G.faultOrder[G.faultRoundIdx]];
  render();
  if(!next.isHuman) setTimeout(()=>faultAIContrib(),600);
}

function faultAIContrib(){
  if(G.gameOver)return;
  let actingId=G.faultOrder[G.faultRoundIdx];
  let agent=G.players[actingId];
  let hand=agent.hand;
  let matchColor=null;

  if(G.faultConsultColor){
    let myReply=G.faultConsultReplies.find(r=>r.name===agent.name);
    if(myReply&&myReply.yes) matchColor=G.faultConsultColor;
  }
  if(!matchColor){
    let firstReal=G.faultContrib.find(c=>c.count>0);
    if(firstReal){
      let recent=G.discard.slice(-4);
      let colCounts={};
      for(let c of recent) if(c.type==='cable') colCounts[c.color]=(colCounts[c.color]||0)+1;
      let best=Object.entries(colCounts).sort((a,b)=>b[1]-a[1])[0];
      if(best) matchColor=best[0];
    }
  }
  if(!matchColor){
    let cnt=countCols(hand);
    let needed=agent.bombDefused?{}:{...agent.bomb.reqs};
    let best=Object.entries(cnt).filter(([c])=>c!=='white').sort((a,b)=>(b[1]-(needed[b[0]]||0))-(a[1]-(needed[a[0]]||0)))[0];
    matchColor=best?best[0]:null;
  }

  // Drawer (idx 0) must give at least 1
  let isDrawer=G.faultRoundIdx===0;
  let valid=matchColor?hand.filter(c=>c.color===matchColor&&c.type==='cable'):[];
  let needed2=agent.bombDefused?0:missingFor(hand,agent.bomb);
  let surplus=valid.length-Math.max(0,needed2);
  let minGive=isDrawer?1:0;
  let give=Math.max(minGive,Math.min(surplus,G.faultPending,valid.length));
  let toGive=valid.slice(0,give);

  if(isDrawer&&toGive.length===0&&valid.length>0){toGive=[valid[0]];give=1;}
  if(isDrawer&&toGive.length===0){
    log(`[${agent.name}] No tiene cables — falla inmediata. −4 segundos.`,'lb');
    tickTime(4);if(G.gameOver)return;
    G.faultPending=999;advanceFaultRound();return;
  }

  for(let card of toGive){let i=agent.hand.indexOf(card);if(i>=0)G.discard.push(agent.hand.splice(i,1)[0]);}
  G.faultContrib.push({playerId:actingId,count:give});
  G.faultPending-=give;
  log(`[${agent.name}] aporta ${give} cable(s)${matchColor?' ('+CN[matchColor]+')':''} — faltan ${G.faultPending}.`,'li');
  render();
  setTimeout(()=>advanceFaultRound(),400);
}

function endFaultRound(success,drawerIdx){
  if(!success){tickTime(4);if(G.gameOver)return;}
  let drawerIsAI=!G.players[drawerIdx].isHuman;
  let drawerAgent=G.players[drawerIdx];
  let fromEffect=G.faultFromEffect||false;
  G.faultMode=null;G.faultRound=false;G.faultOrder=[];G.faultRoundIdx=0;
  G.faultContrib=[];G.faultSelected=[];G.faultPending=0;
  G.faultConsult=false;G.faultConsultColor=null;G.faultConsultReplies=[];G.faultConsultDone=false;

  if(fromEffect){
    // Fault from Green effect — no hint, continue actions
    G.phase='action';
    render();
    if(drawerIsAI&&!drawerAgent.isHuman) setTimeout(()=>aiDrawPhase(drawerAgent),400);
  } else {
    G.phase='hint';
    render();
    if(drawerIsAI&&!drawerAgent.isHuman) setTimeout(()=>aiHintPhase(drawerAgent),400);
  }
}

// ─── CRISIS ──────────────────────────────────────────────────────────────────
function startCrisis(bomb,stealerIdx){
  G.crisisMode=true;G.crisisBomb=bomb;G.crisisStealer=stealerIdx;
  G.selectedCards=[];G.crisisOwnSelected=[];
  log(`💣 ¡CRISIS! ${bomb.label} — ${Object.entries(bomb.reqs).map(([c,n])=>`${n}×${CN[c]}`).join(' + ')}`,'lb');
  render();
}

function doCrisisAttempt(){
  if(!G.crisisMode)return;
  let stealer=G.players[G.crisisStealer];
  let other=G.players.find(p=>p.id!==stealer.id);
  let ownCards=stealer.isHuman&&G.crisisOwnSelected.length>0
    ? G.crisisOwnSelected.map(i=>stealer.hand[i]).filter(Boolean)
    : [...stealer.hand];
  let stolen=other?G.selectedCards.map(i=>other.hand[i]).filter(Boolean):[];
  let combined=[...ownCards,...stolen];
  let bomb=G.crisisBomb;
  let isSpecial=bomb.type==='special';

  if(canDefuse(combined,bomb)){
    let rem=neededCards(combined,bomb);
    for(let card of stolen){let col=card.color;if((rem[col]||0)>0){rem[col]--;let i=other.hand.indexOf(card);if(i>=0)other.hand.splice(i,1);}}
    if(stealer.isHuman&&G.crisisOwnSelected.length>0){
      let idxs=[...G.crisisOwnSelected].sort((a,b)=>b-a);
      for(let i of idxs) stealer.hand.splice(i,1);
    } else {
      stealer.hand=removeCards(stealer.hand,rem);
    }
    bomb.defused=true;
    if(isSpecial){G.specialBomb.defused=true;G.clockDouble=false;log('☢ ¡BOMBA ESPECIAL DESACTIVADA! Reloj congelado.','lm');}
    else {if(!G.publicBombs.includes(bomb))G.publicBombs.push(bomb);log('¡BOMBA DESACTIVADA! Reloj congelado.','lo');}
    G.crisisMode=false;G.crisisBomb=null;G.selectedCards=[];G.crisisOwnSelected=[];
    if(checkWin())return;
    G.phase='hint';
    if(cur().isHuman) render();
    else {render();setTimeout(()=>aiHintPhase(cur()),500);}
    return;
  }

  let pen=G.numPlayers===2?7:10;
  log(`💥 FALLO — −${pen} segundos.`,'lb');
  if(isSpecial){
    G.specialFailed=true;G.clockDouble=true;
    if(!G.publicBombs.includes(bomb)&&!G.specialBomb) G.specialBomb=bomb;
    log('⚠ Reloj ahora avanza el DOBLE por turno.','lm');
  } else {
    bomb.defused=false;if(!G.publicBombs.includes(bomb))G.publicBombs.push(bomb);
  }
  tickTime(pen);if(G.gameOver)return;
  G.crisisMode=false;G.crisisBomb=null;G.selectedCards=[];G.crisisOwnSelected=[];
  G.phase='hint';
  if(cur().isHuman) render();
  else {render();setTimeout(()=>aiHintPhase(cur()),500);}
}

function doCrisisAdopt(){
  let bomb=G.crisisBomb;
  bomb.defused=false;
  if(bomb.type==='special'){if(!G.specialBomb)G.specialBomb=bomb;}
  else {if(!G.publicBombs.includes(bomb))G.publicBombs.push(bomb);}
  log('Bomba adoptada. Reloj avanza normalmente.','lw');
  G.crisisMode=false;G.crisisBomb=null;G.selectedCards=[];G.crisisOwnSelected=[];
  G.phase='hint';render();
}

// ─── AVANCE DE TURNO ─────────────────────────────────────────────────────────
function advanceTurn(){
  G.currentTurn=(G.currentTurn+1)%G.numPlayers;
  G.phase='action';G.actionsDone=0;G.selectedCards=[];G.faultSelected=[];G.skipClock=false;
  if(checkWin())return;
  render();
  if(!cur().isHuman){aiThinking=true;render();setTimeout(doAITurn,600);}
}

// ─── IA TURNO ────────────────────────────────────────────────────────────────
function doAITurn(){
  if(G.gameOver){aiThinking=false;render();return;}
  let agent=cur();
  if(agent.isHuman){aiThinking=false;render();return;}

  let decisions=aiBrain(agent,G);
  let idx=0;
  function next(){
    if(G.gameOver){aiThinking=false;render();return;}
    if(idx>=decisions.length){setTimeout(()=>aiDrawPhase(agent),500);return;}
    let dec=decisions[idx++];
    log(dec.msg,'li');
    if(dec.type==='effect'){
      let card=agent.hand.find(c=>c.color===dec.color&&c.type==='cable');
      if(card){agent.hand.splice(agent.hand.indexOf(card),1);G.actionsDone++;applyEffect(card,agent,false);}
      if(G.crisisMode||G.faultRound){aiThinking=false;return;}
    } else if(dec.type==='defuse_personal'){
      if(!agent.bombDefused&&canDefuse(agent.hand,agent.bomb)){
        agent.hand=removeCards(agent.hand,neededCards(agent.hand,agent.bomb));
        agent.bombDefused=true;G.actionsDone++;
        log(`[${agent.name}] ¡Bomba personal desactivada!`,'lo');
        if(checkWin()){aiThinking=false;return;}
      }
    } else if(dec.type==='defuse_public'){
      let b=G.publicBombs[dec.idx];
      if(b&&!b.defused&&canDefuse(agent.hand,b)){
        agent.hand=removeCards(agent.hand,neededCards(agent.hand,b));
        b.defused=true;G.actionsDone++;
        log(`[${agent.name}] ¡Bomba pública desactivada!`,'lo');
        if(checkWin()){aiThinking=false;return;}
      }
    } else if(dec.type==='defuse_special'){
      let b=G.specialBomb;
      if(b&&!b.defused&&canDefuse(agent.hand,b)){
        agent.hand=removeCards(agent.hand,neededCards(agent.hand,b));
        b.defused=true;G.clockDouble=false;G.actionsDone++;
        log(`[${agent.name}] ☢ ¡Bomba Especial desactivada!`,'lm');
        if(checkWin()){aiThinking=false;return;}
      }
    }
    render();
    setTimeout(next,500);
  }
  next();
}

function aiDrawPhase(agent){
  if(G.gameOver){aiThinking=false;render();return;}
  if(G.gameDeck.length===0){endGame('lose','SISTEMA COLAPSADO','El mazo se agotó.');aiThinking=false;return;}
  let card=G.gameDeck.shift();
  log(`[${agent.name}] Roba: ${card.label||card.color}`,'li');

  if(card.type==='fault'){
    aiThinking=false;
    startFaultRound(card,G.currentTurn,false);
    return;
  }
  if(card.type==='special'){
    G.specialBomb=card;
    announceColors();
    log('☢ ¡BOMBA ESPECIAL! IA intenta desactivar.','lm');
    aiCrisisPhase(agent,card);return;
  }
  if(card.type==='bomb'){
    announceColors();
    aiCrisisPhase(agent,card);return;
  }
  agent.hand.push(card);
  capHand(agent);
  render();
  setTimeout(()=>aiHintPhase(agent),400);
}

function aiCrisisPhase(agent,bomb){
  let dec=aiCrisisDecide(agent,bomb,G);
  log(dec.msg,'li');
  if(dec.attempt){
    let other=dec.stealFrom!==undefined?G.players.find(p=>p.id===dec.stealFrom):null;
    let stolen=other?dec.steal.map(i=>other.hand[i]).filter(Boolean):[];
    let combined=[...agent.hand,...stolen];
    let isSpecial=bomb.type==='special';
    if(canDefuse(combined,bomb)){
      let rem=neededCards(combined,bomb);
      for(let card of stolen){let col=card.color;if((rem[col]||0)>0){rem[col]--;let i=other.hand.indexOf(card);if(i>=0)other.hand.splice(i,1);}}
      agent.hand=removeCards(agent.hand,rem);
      bomb.defused=true;
      if(isSpecial){G.specialBomb.defused=true;G.clockDouble=false;log(`[${agent.name}] ☢ ¡Especial desactivada! Reloj congelado.`,'lm');}
      else{if(!G.publicBombs.includes(bomb))G.publicBombs.push(bomb);log(`[${agent.name}] ¡Crisis resuelta! Reloj congelado.`,'lo');}
      if(checkWin()){aiThinking=false;return;}
      render();setTimeout(()=>aiHintPhase(agent),400);return;
    }
    let pen=G.numPlayers===2?7:10;
    log(`[${agent.name}] 💥 Fallo. −${pen} segundos.`,'lb');
    if(isSpecial){G.specialFailed=true;G.clockDouble=true;log('⚠ Reloj ×2 a partir de ahora.','lm');}
    else{bomb.defused=false;if(!G.publicBombs.includes(bomb))G.publicBombs.push(bomb);}
    tickTime(pen);if(G.gameOver){aiThinking=false;return;}
  } else {
    bomb.defused=false;
    if(bomb.type==='special'&&!G.specialBomb)G.specialBomb=bomb;
    else if(!G.publicBombs.includes(bomb))G.publicBombs.push(bomb);
  }
  render();setTimeout(()=>aiHintPhase(agent),400);
}

function aiHintPhase(agent){
  if(G.gameOver){aiThinking=false;render();return;}
  // AI hint: announce most relevant color
  let cnt=countCols(agent.hand);
  let colors=Object.keys(cnt).filter(c=>cnt[c]>0&&c!=='white');
  let hint='—';
  if(colors.length>0){
    // Pick the color they have most of
    let best=colors.sort((a,b)=>(cnt[b]||0)-(cnt[a]||0))[0];
    hint=CN[best]||best;
  } else if(cnt.white>0){hint='Comodín';}
  else {hint='Ninguno';}
  G.hints.push({playerName:agent.name,text:hint});
  if(G.hints.length>10) G.hints.shift();
  log(`[${agent.name}] pista: "${hint}"`, 'li');
  render();
  setTimeout(()=>aiClockPhase(agent),400);
}

function aiClockPhase(agent){
  if(G.gameOver){aiThinking=false;render();return;}
  if(G.skipClock){
    G.skipClock=false;log(`[${agent.name}] 🔴 Reloj congelado.`,'lo');
  } else {
    tickTime(1);if(G.gameOver){aiThinking=false;render();return;}
    log(`[${agent.name}] Reloj: ${G.timeLeft} seg.${G.clockDouble?' (×2)':''}`,'li');
  }
  aiThinking=false;G.phase='action';G.actionsDone=0;
  advanceTurn();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  if(!G.players){document.getElementById('root').innerHTML='';return;}
  document.getElementById('root').innerHTML=buildUI();
  // Timer bar
  let fill=document.getElementById('tfill'),cnt=document.getElementById('tcnt');
  if(fill&&cnt){
    let max=Math.max(G.timeDeck.length+G.discard.length,G.timeLeft,1);
    let pct=Math.max(0,Math.min(100,(G.timeLeft/max)*100));
    let col=pct>50?'var(--g)':pct>25?'#ff9900':'var(--r)';
    fill.style.cssText=`width:${pct}%;background:${col};height:100%;transition:width .4s,background .4s;`;
    cnt.style.color=col;cnt.textContent=G.timeLeft;
  }
}

function buildUI(){
  let p=cur(),ph=G.phase;
  let phSteps=['action','draw','hint','clock'];
  let phLabels=['ACCIÓN','ROBO','PISTA','RELOJ'];

  let phBar=`<div class="pbar">
    ${phSteps.map((s,i)=>`<span class="pstep ${s===ph?'active':phSteps.indexOf(ph)>i?'done':''}">${phLabels[i]}</span>${i<3?`<span style="color:var(--bor)">→</span>`:''}`).join('')}
    <span style="flex:1"></span>
    ${aiThinking?`<span class="sbadge by">IA PENSANDO...</span>`:p.isHuman?`<span class="sbadge bg">TU TURNO</span>`:`<span class="sbadge by">TURNO ${p.name}</span>`}
    ${G.clockDouble?`<span class="sbadge" style="border:1px solid #ff00cc;color:#ff00cc;margin-left:4px">RELOJ ×2 ☢</span>`:''}
  </div>`;

  let tBar=`<div class="tbar">
    <span class="tlbl">TIEMPO</span>
    <div class="ttrack"><div id="tfill"></div></div>
    <span id="tcnt" class="tcnt">${G.timeLeft}</span>
    <span style="font-size:10px;color:var(--txd)">SEG</span>
    ${G.skipClock?`<span style="font-size:10px;color:var(--r);margin-left:8px;border:1px solid var(--rd);padding:1px 7px;border-radius:2px">🔴 CONGELADO</span>`:''}
    <span style="font-size:10px;color:var(--txd);margin-left:12px">MAZO: <span style="color:var(--txt)">${G.gameDeck.length}</span></span>
    <span style="font-size:10px;color:var(--txd)">BOMBAS: <span style="color:var(--txt)">${G.gameDeck.filter(c=>c.type==='bomb'||c.type==='special').length}</span></span>
    <span style="font-size:10px;color:var(--txd)">DESCARTE: <span style="color:var(--txt)">${G.discard.length}</span></span>
  </div>`;

  // ── SPECIAL MODES ─────────────────────────────────────────────────────────
  let special='';

  if(G.discardMode){
    let player=G.players.find(x=>x.isHuman);
    let sel=G.discardSelected.map(i=>player.hand[i]).filter(Boolean);
    special=`<div class="discard-box">
      ✋ MANO LLENA — ${player.hand.length}/${G.maxHand} cartas. Elegí ${G.discardCount} para descartar.
      <div style="margin:6px 0;font-size:11px">Seleccionadas: ${sel.map(c=>`<span style="color:var(--${c.color==='white'?'w':c.color})">${c.label}</span>`).join(', ')||'—'}</div>
      <div class="brow"><button class="btn warn" onclick="doConfirmDiscard()" ${G.discardSelected.length<G.discardCount?'disabled':''}>✓ DESCARTAR (${G.discardSelected.length}/${G.discardCount})</button></div>
    </div>`;
  }

  if(G.crisisMode&&G.crisisBomb){
    let stealer=G.players[G.crisisStealer];
    let isHumanStealer=stealer.isHuman;
    let other=G.players.find(p=>p.id!==stealer.id);
    let ownCards=isHumanStealer&&G.crisisOwnSelected.length>0
      ?G.crisisOwnSelected.map(i=>stealer.hand[i]).filter(Boolean):[...stealer.hand];
    let stolen=other?G.selectedCards.map(i=>other&&other.hand[i]).filter(Boolean):[];
    let combined=[...ownCards,...stolen];
    let possible=canDefuse(combined,G.crisisBomb);
    let isSpecial=G.crisisBomb.type==='special';

    let stealHTML=other?other.hand.map((_,i)=>isHumanStealer
      ?`<div class="cback ${G.selectedCards.includes(i)?'sel':''}" onclick="selectAICard(${i})">?</div>`
      :`<div class="cback">?</div>`).join(''):'';

    let ownHandHTML='';
    if(isHumanStealer){
      ownHandHTML=stealer.hand.map((card,i)=>{
        let sel=G.crisisOwnSelected.includes(i);
        let col=card.type==='fault'?'fault':card.type==='bomb'?'bomb-c':card.type==='special'?'special-c':card.color;
        let icon=CI[card.type]||CI[card.color]||'■';
        let dim=(!sel&&G.crisisOwnSelected.length>0)?'opacity:.5;':'';
        return `<div class="card ${col} ${sel?'selected':''}" style="${dim}" onclick="selectCard(${i})" title="${card.label||''}">
          <div class="cicon">${icon}</div><div class="clbl">${(card.label||card.color||'').substring(0,7)}</div>
        </div>`;
      }).join('');
    }

    let boxClass=isSpecial?'special-box':'crisis-box';
    special=`<div class="${boxClass}">
      ${isSpecial?'☢':'💣'} ¡CRISIS! <strong>${G.crisisBomb.label}</strong> — ${reqHTML(G.crisisBomb)}<br>
      <span style="font-size:10px;opacity:.8">Solo se pueden anunciar colores (sin cantidades). ${isSpecial?'¡Esta es la Bomba Especial!':''}</span>
      ${isHumanStealer?`
      <div style="margin:8px 0 4px;font-size:10px">1. Tus cartas para usar (seleccioná o usá todas):</div>
      <div class="hand" style="margin-bottom:8px">${ownHandHTML}</div>
      <div style="margin:4px 0;font-size:10px">2. Robá 1-2 a ciegas de ${other?other.name:'compañero'}:</div>
      <div class="hand" style="margin:6px 0">${stealHTML}</div>
      <div class="brow">
        <button class="btn primary" onclick="doCrisisAttempt()">⚡ DESACTIVAR ${possible?'(POSIBLE)':'(RIESGO)'}</button>
        <button class="btn" onclick="doCrisisAdopt()">Adoptar para después</button>
      </div>`:`
      <div style="margin:6px 0 4px;font-size:10px">${stealer.name} roba de tu mano a ciegas:</div>
      <div class="hand" style="margin:6px 0">${stealHTML}</div>`}
    </div>`;
  }

  if(G.faultRound&&G.faultMode){
    let actingId=G.faultOrder[G.faultRoundIdx];
    let actingPlayer=G.players[actingId];
    let isHumanActing=actingPlayer&&actingPlayer.isHuman;
    let contribBar=G.faultOrder.map((pid,i)=>{
      let pl=G.players[pid];
      let contrib=G.faultContrib.find(c=>c.playerId===pid);
      let status=contrib?`✓ ${contrib.count}c`:i===G.faultRoundIdx?'⬅ AHORA':'...';
      let col=contrib?'var(--gd)':i===G.faultRoundIdx?'#ff9900':'var(--txd)';
      return `<span style="color:${col};font-size:10px">${pl.name}: ${status}</span>`;
    }).join(' &nbsp;|&nbsp; ');

    let replyHTML='';
    if(G.faultConsultColor&&G.faultConsultReplies.length>0){
      replyHTML=`<div style="margin:6px 0;padding:5px 8px;background:rgba(0,0,0,.2);border-radius:2px;font-size:10px">
        Preguntaste ${CN[G.faultConsultColor]||G.faultConsultColor}:
        ${G.faultConsultReplies.map(r=>`<span style="color:${r.yes?'var(--g)':'var(--txd)'}"> ${r.name}: ${r.yes?'✓ SÍ':'✗ NO'}</span>`).join(' ')}
      </div>`;
    }

    let consultHTML='';
    if(G.faultConsult&&isHumanActing){
      let humanPlayer=G.players.find(x=>x.isHuman);
      let askCols=[...new Set(humanPlayer.hand.filter(c=>c.type==='cable'&&c.color!=='white').map(c=>c.color)),'red','green','blue'].filter((v,i,a)=>a.indexOf(v)===i);
      let askBtns=askCols.map(c=>`<button class="btn ${G.faultConsultColor===c?'primary':''}" onclick="doFaultAsk('${c}')" style="font-size:9px;padding:4px 8px;border-color:var(--${c}=='white'?'w':c});color:var(--${c==='white'?'w':c})">${CN[c]}</button>`).join('');
      consultHTML=`<div style="margin:6px 0;font-size:10px;color:#ff9900">¿Consultar al equipo antes de aportar?</div>
        <div class="brow">${askBtns}</div>
        ${replyHTML}
        <div class="brow" style="margin-top:8px"><button class="btn warn" onclick="doFaultSkipConsult()">Jugar sin consultar →</button></div>`;
    } else if(isHumanActing){
      let isDrawer=G.faultRoundIdx===0;
      consultHTML=`${replyHTML}
        <span style="font-size:10px;color:#ff9900">Tu turno — seleccioná ${isDrawer?'al menos 1':''} cable(s) del mismo color.</span>
        <div class="brow">
          <button class="btn warn" onclick="doFaultContrib()">${G.faultSelected.length>0?`Aportar ${G.faultSelected.length}`:'Aportar 0'}</button>
          ${!isDrawer?`<button class="btn" onclick="doFaultPass()">Pasar (0)</button>`:''}
        </div>`;
    } else {
      consultHTML=`<span style="font-size:10px;color:var(--txd)">${actingPlayer?actingPlayer.name+' está decidiendo...':''}</span>`;
    }

    special+=`<div class="fault-box">
      ⚡ FALLA — 3 cables del mismo color &nbsp;|&nbsp; Faltan: <strong>${G.faultPending}</strong>/3<br>
      <div style="margin:5px 0 4px;font-size:10px">${contribBar}</div>
      ${consultHTML}
    </div>`;
  }

  // ── PISTA ────────────────────────────────────────────────────────────────
  let hintSection='';
  if(ph==='hint'&&cur().isHuman&&!G.crisisMode&&!G.faultRound){
    hintSection=`<div style="background:rgba(0,255,136,.04);border:1px solid var(--gd);border-radius:4px;padding:10px 14px;margin-bottom:10px;">
      <div class="ptitle" style="margin-bottom:8px;color:var(--gd)">💬 PISTA VERBAL OBLIGATORIA</div>
      <div style="font-size:10px;color:var(--txd);margin-bottom:8px">Una sola palabra: color, cantidad o cualidad abstracta (Listo, Suficiente, Crítico, etc.)</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input class="hint-input" id="hint-input" type="text" maxlength="20" placeholder="Ej: Verde, Tres, Listo..." 
          value="${G.hintText||''}" 
          oninput="updateHintText(this.value)"
          onkeydown="if(event.key==='Enter')doSubmitHint()">
        <button class="btn primary" onclick="doSubmitHint()">→ DAR PISTA</button>
      </div>
    </div>`;
  }

  // ── ÚLTIMAS PISTAS ───────────────────────────────────────────────────────
  let hintsSection='';
  if(G.hints.length>0){
    hintsSection=`<div style="font-size:10px;color:var(--txd);margin-bottom:8px;padding:6px 10px;background:rgba(0,255,136,.03);border-radius:4px;border:1px solid var(--bor)">
      💬 ${G.hints.slice(-4).map(h=>`<span style="color:var(--g)">${h.playerName}</span>: "${h.text}"`).join(' &nbsp;→&nbsp; ')}
    </div>`;
  }

  // ── PANELES DE JUGADORES ─────────────────────────────────────────────────
  let panels='';
  for(let pl of G.players){
    let isActive=G.currentTurn===pl.id;
    let isFaultActor=G.faultRound&&G.faultOrder[G.faultRoundIdx]===pl.id;
    let isCrisisStealer=G.crisisMode&&G.crisisStealer===pl.id;

    let handHTML='';
    if(pl.isHuman){
      if(isCrisisStealer){
        handHTML=`<span style="font-size:11px;color:var(--txd)">↑ Seleccioná tus cartas en el panel de crisis</span>`;
      } else {
        let selArr=G.discardMode?G.discardSelected:G.faultRound?G.faultSelected:G.selectedCards;
        handHTML=pl.hand.map((card,i)=>{
          let sel=selArr.includes(i);
          let col=card.type==='fault'?'fault':card.type==='bomb'?'bomb-c':card.type==='special'?'special-c':card.color;
          let icon=CI[card.type]||CI[card.color]||'■';
          let dim='';
          if(G.faultRound&&isFaultActor&&card.type==='cable'){
            let firstCard=G.faultSelected.length>0?pl.hand[G.faultSelected[0]]:null;
            if(firstCard&&card.color!==firstCard.color) dim='opacity:.3;pointer-events:none;';
          }
          if(G.discardMode&&!sel&&G.discardSelected.length>0) dim='opacity:.5;';
          return `<div class="card ${col} ${sel?'selected':''}" style="${dim}" onclick="selectCard(${i})" title="${card.label||''}">
            <div class="cicon">${icon}</div><div class="clbl">${(card.label||card.color||'').substring(0,7)}</div>
          </div>`;
        }).join('');
      }
    } else {
      handHTML=pl.hand.map(()=>`<div class="cback">?</div>`).join('');
    }

    let selPrev='';
    if(pl.isHuman&&!G.crisisMode&&!G.faultRound&&!G.discardMode&&G.selectedCards.length>0){
      let sel=G.selectedCards.map(i=>pl.hand[i]).filter(Boolean);
      selPrev=`<div class="sel-prev">→ ${sel.map(c=>`<span style="color:var(--${c.color==='white'?'w':c.color})">${c.label}</span>`).join(', ')}</div>`;
    }
    if(pl.isHuman&&G.discardMode&&G.discardSelected.length>0){
      let sel=G.discardSelected.map(i=>pl.hand[i]).filter(Boolean);
      selPrev=`<div class="sel-prev" style="border-color:#ff9900">Descartando: ${sel.map(c=>`<span style="color:var(--${c.color==='white'?'w':c.color})">${c.label}</span>`).join(', ')}</div>`;
    }
    if(pl.isHuman&&G.faultRound&&isFaultActor&&G.faultSelected.length>0){
      let sel=G.faultSelected.map(i=>pl.hand[i]).filter(Boolean);
      selPrev=`<div class="sel-prev" style="border-color:#ff6600">Aportando: ${sel.map(c=>`<span style="color:var(--${c.color==='white'?'w':c.color})">${c.label}</span>`).join(', ')}</div>`;
    }

    let actionBtns='';
    if(pl.isHuman&&!aiThinking&&!G.crisisMode&&!G.faultRound&&!G.discardMode&&isActive){
      let canDefPers=!pl.bombDefused&&canDefuse(pl.hand,pl.bomb);
      let canDefSpec=G.specialBomb&&!G.specialBomb.defused&&canDefuse(pl.hand,G.specialBomb);
      let canUseEfx=G.selectedCards.length>0&&G.actionsDone<G.maxActions;
      let canDefuse2=G.actionsDone<G.maxActions;
      if(ph==='action'){
        actionBtns=`<div class="brow">
          ${canDefPers&&canDefuse2?`<button class="btn primary" onclick="doDefusePersonal()">💣 DESACTIVAR PERSONAL</button>`:''}
          ${canDefSpec&&canDefuse2?`<button class="btn" style="border-color:#ff00cc;color:#ff88ee" onclick="doDefuseSpecial()">☢ DESACTIVAR ESPECIAL</button>`:''}
          ${canUseEfx?`<button class="btn" onclick="doUseEffect()">⚡ EFECTO (${G.actionsDone}/${G.maxActions})</button>`:''}
          <button class="btn" onclick="doSkipToDraw()">→ ROBAR</button>
        </div>`;
        // Bombas públicas desactivables
        G.publicBombs.forEach((b,i)=>{
          if(!b.defused&&canDefuse2&&canDefuse(pl.hand,b)){
            actionBtns+=`<button class="btn warn" style="font-size:9px;padding:4px 8px;margin-top:4px" onclick="doDefusePublic(${i})">DESACTIVAR PÚB. ${b.id||'#'+(i+1)}</button>`;
          }
        });
      } else if(ph==='draw'){
        actionBtns=`<div class="brow"><button class="btn primary" onclick="doDrawCard()">↓ ROBAR CARTA</button></div>`;
      } else if(ph==='clock'){
        actionBtns=`<div class="brow"><button class="btn danger" onclick="doAdvanceClock()">⏱ AVANZAR RELOJ${G.clockDouble?' (×2)':''}</button></div>`;
      }
    }

    let bombDisp=pl.bombDefused
      ?`<span style="color:var(--g);font-size:10px;margin-top:4px;display:block">✓ DESACTIVADA</span>`
      :`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">${reqHTML(pl.bomb)}</div>`;

    panels+=`<div class="panel" style="border-color:${isActive?'#ff9900':isFaultActor?'#ff6600':'var(--bor)'}">
      <div class="ptitle">${pl.isHuman?'👤':'🤖'} ${pl.name} (${pl.hand.length}c) ${isActive?`<span class="sbadge by" style="float:right">ACTIVO</span>`:isFaultActor?`<span class="sbadge" style="float:right;border:1px solid #ff6600;color:#ff6600">FALLA</span>`:''}</div>
      <div class="hand">${handHTML}</div>
      ${selPrev}
      ${actionBtns}
      <div style="margin-top:8px;padding-top:6px;border-top:1px solid var(--bor)">
        <div class="ptitle" style="margin-bottom:4px">💣 BOMBA PERSONAL</div>
        <div class="btier ${pl.bomb.tier}">${pl.bomb.label}</div>
        ${bombDisp}
      </div>
    </div>`;
  }

  let gridClass=G.numPlayers<=4?'grid2':'grid3';

  // ── BOMBA ESPECIAL ───────────────────────────────────────────────────────
  let specSlot='';
  if(G.specialBomb){
    let b=G.specialBomb;
    if(b.defused){
      specSlot=`<div class="bslot defused"><div class="btier special">☢ ${b.label}</div><div style="color:var(--g);font-size:10px;margin-top:4px">✓ DESACTIVADA</div></div>`;
    } else {
      specSlot=`<div class="bslot special-slot"><div class="btier special">☢ ${b.label}</div><div style="margin-top:6px">${reqHTML(b)}</div>${G.clockDouble?`<div style="color:#ff00cc;font-size:10px;margin-top:4px">⚠ RELOJ ×2 POR TURNO</div>`:''}</div>`;
    }
  } else {
    specSlot=`<div class="bslot" style="opacity:.4"><div class="btier special">☢ BOMBA ESPECIAL</div><div style="font-size:10px;color:var(--txd);margin-top:4px">Oculta en el mazo...</div></div>`;
  }

  // ── BOMBAS PÚBLICAS ──────────────────────────────────────────────────────
  let pubSlots=G.publicBombs.length>0
    ?G.publicBombs.map((b,i)=>b.defused
      ?`<div class="bslot defused"><div class="btier ${b.tier}">${b.label}</div><div style="color:var(--g);font-size:10px;margin-top:4px">✓ OK</div></div>`
      :`<div class="bslot active"><div class="btier ${b.tier}">${b.label}</div><div style="margin-top:5px">${reqHTML(b)}</div></div>`
    ).join('')
    :`<span style="font-size:11px;color:var(--txd)">Ninguna activa aún</span>`;

  // ── LOG ──────────────────────────────────────────────────────────────────
  let logH=G.log.slice(0,14).map(l=>`<div class="${l.cls}">&gt; ${l.msg}</div>`).join('');

  return `${phBar}${tBar}${special}${hintSection}${hintsSection}
  <div class="${gridClass}" style="margin-bottom:10px">${panels}</div>
  <div class="panel" style="margin-bottom:10px">
    <div class="ptitle">☢ BOMBA ESPECIAL &nbsp;&amp;&nbsp; 🌐 BOMBAS PÚBLICAS (${G.publicBombs.filter(b=>!b.defused).length} pendientes)</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">${specSlot}&nbsp;${pubSlots}</div>
  </div>
  <div class="panel">
    <div class="ptitle">📡 LOG</div>
    <div class="log-area">${logH}</div>
  </div>`;
}



// ═══════════════════════════════════════════════════════════════════════════
// MULTIPLAYER LAYER — session, websocket, lobby, spectators, bots
// ═══════════════════════════════════════════════════════════════════════════
const SESSION_KEY = 'cus_v4';

let MP = {
  myId: null, myName: null,
  roomId: null, roomCode: null,
  isHost: false, isSpectator: false,
  roomPlayers: [],   // full list from server (includes spectators + bots)
  ws: null, wsStatus: 'disconnected',
  pingInterval: null,
  screen: 'landing',  // landing | lobby | game
  hints: [],
};

// ─── SESSION ───────────────────────────────────────────────────────────────
function saveSession() {
  if (!MP.roomId || !MP.myId) return;
  localStorage.setItem(SESSION_KEY, JSON.stringify({
    myId: MP.myId, myName: MP.myName,
    roomId: MP.roomId, roomCode: MP.roomCode,
    isHost: MP.isHost, isSpectator: MP.isSpectator,
  }));
}
function clearSession() { localStorage.removeItem(SESSION_KEY); }

async function tryRestore() {
  const raw = localStorage.getItem(SESSION_KEY);
  if (!raw) return false;
  let s; try { s = JSON.parse(raw); } catch { clearSession(); return false; }
  try {
    const r = await fetch('/api/rooms/' + s.roomId + '/rejoin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ playerId: s.myId }),
    });
    if (!r.ok) { clearSession(); return false; }
    const d = await r.json();
    MP.myId = s.myId; MP.myName = s.myName;
    MP.roomId = d.roomId; MP.roomCode = d.code;
    MP.isHost = d.isHost; MP.isSpectator = d.isSpectator;
    MP.roomPlayers = d.room.players;
    if (d.gameState) {
      G = d.gameState;
      // Ensure all UI state fields exist (older saved states may lack them)
      G.selectedCards = G.selectedCards || [];
      G.crisisOwnSelected = G.crisisOwnSelected || [];
      G.faultSelected = G.faultSelected || [];
      G.discardSelected = G.discardSelected || [];
      G.faultOrder = G.faultOrder || [];
      G.faultContrib = G.faultContrib || [];
      G.faultConsultReplies = G.faultConsultReplies || [];
      G.crisisMode = G.crisisMode || false;
      G.faultRound = G.faultRound || false;
      G.discardMode = G.discardMode || false;
      G.passCardMode = G.passCardMode || false;
      appLog = G.log || [];
      MP.screen = 'game';
    } else {
      MP.screen = 'lobby';
    }
    saveSession();
    connectWS();
    return true;
  } catch { clearSession(); return false; }
}

// ─── WEBSOCKET ─────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  MP.wsStatus = 'connecting'; renderAll();
  if (MP.ws) { try { MP.ws.close(); } catch {} }
  MP.ws = new WebSocket(proto + '//' + location.host);
  MP.ws.onopen = () => {
    MP.wsStatus = 'connected';
    wsSend('connect', { roomId: MP.roomId, playerId: MP.myId });
    clearInterval(MP.pingInterval);
    MP.pingInterval = setInterval(() => wsSend('ping', {}), 25000);
    renderAll();
  };
  MP.ws.onmessage = evt => { let m; try { m = JSON.parse(evt.data); } catch { return; } handleWS(m); };
  MP.ws.onclose = () => {
    MP.wsStatus = 'disconnected'; clearInterval(MP.pingInterval); renderAll();
    if (MP.roomId && MP.myId) setTimeout(connectWS, 3000);
  };
  MP.ws.onerror = () => { MP.wsStatus = 'error'; renderAll(); };
}
function wsSend(type, data) {
  if (MP.ws && MP.ws.readyState === WebSocket.OPEN) MP.ws.send(JSON.stringify({ type, data }));
}

function handleWS(msg) {
  const { type, data } = msg;
  if (type === 'connected') {
    MP.roomPlayers = data.room.players;
    MP.isHost = data.room.hostId === MP.myId;
    MP.isSpectator = !!data.isSpectator;
    saveSession();
    if (data.gameState) {
      G = data.gameState; appLog = G.log || [];
      G.selectedCards = G.selectedCards || [];
      G.crisisOwnSelected = G.crisisOwnSelected || [];
      G.faultSelected = G.faultSelected || [];
      G.discardSelected = G.discardSelected || [];
      G.faultOrder = G.faultOrder || [];
      G.faultContrib = G.faultContrib || [];
      G.faultConsultReplies = G.faultConsultReplies || [];
      G.crisisMode = G.crisisMode || false;
      G.faultRound = G.faultRound || false;
      G.discardMode = G.discardMode || false;
      G.passCardMode = G.passCardMode || false;
      MP.screen = 'game';
    } else {
      MP.screen = 'lobby';
    }
    renderAll(); return;
  }
  if (type === 'player_connected' || type === 'player_disconnected' || type === 'room_update') {
    MP.roomPlayers = data.room.players;
    if (type === 'player_connected') log(data.name + ' se conectó.', 'lp');
    if (type === 'player_disconnected') log(data.name + ' se desconectó.', 'lw');
    renderAll(); return;
  }
  if (type === 'game_started') {
    G = data.gameState; appLog = G.log || [];
    G.selectedCards = G.selectedCards || [];
    G.crisisOwnSelected = G.crisisOwnSelected || [];
    G.faultSelected = G.faultSelected || [];
    G.discardSelected = G.discardSelected || [];
    G.faultOrder = G.faultOrder || [];
    G.faultContrib = G.faultContrib || [];
    G.faultConsultReplies = G.faultConsultReplies || [];
    G.crisisMode = G.crisisMode || false;
    G.faultRound = G.faultRound || false;
    G.discardMode = G.discardMode || false;
    G.passCardMode = G.passCardMode || false;
    MP.roomPlayers = data.room.players;
    MP.screen = 'game';
    log('¡Partida iniciada!', 'lo'); renderAll(); return;
  }
  if (type === 'game_state') {
    G = data.gameState; appLog = G.log || [];
    G.selectedCards = G.selectedCards || [];
    G.crisisOwnSelected = G.crisisOwnSelected || [];
    G.faultSelected = G.faultSelected || [];
    G.discardSelected = G.discardSelected || [];
    G.faultOrder = G.faultOrder || [];
    G.faultContrib = G.faultContrib || [];
    G.faultConsultReplies = G.faultConsultReplies || [];
    if (data.action) log(data.action, 'lp');
    renderAll(); return;
  }
  if (type === 'hint') {
    MP.hints.push({ playerName: data.playerName, text: data.text });
    if (MP.hints.length > 10) MP.hints.shift();
    log(data.playerName + ': "' + data.text + '"', 'lo');
    renderAll(); return;
  }
  if (type === 'game_ended') {
    G = null; MP.screen = 'lobby';
    if (data.logData) generatePDFLog(data.logData);
    renderAll(); return;
  }
}

function pushG(action) {
  if (G) G.log = appLog.slice(0, 50);
  wsSend('game_action', { gameState: G, action });
}

// ─── LOBBY ACTIONS ─────────────────────────────────────────────────────────
async function doCreate() {
  const name = (document.getElementById('inp-name')?.value || '').trim();
  if (!name) { alert('Ingresá tu nombre.'); return; }
  try {
    const r = await fetch('/api/rooms', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerName: name }) });
    const d = await r.json(); if (!r.ok) { alert(d.error || 'Error.'); return; }
    MP.myId = d.playerId; MP.myName = name;
    MP.roomId = d.roomId; MP.roomCode = d.code;
    MP.isHost = true; MP.isSpectator = false;
    MP.roomPlayers = d.room.players;
    saveSession(); connectWS(); MP.screen = 'lobby'; renderAll();
  } catch (e) { alert('Error: ' + e.message); }
}
async function doJoin() {
  const name = (document.getElementById('inp-name2')?.value || '').trim();
  const code = (document.getElementById('inp-code')?.value || '').trim().toUpperCase();
  if (!name) { alert('Ingresá tu nombre.'); return; }
  if (!code || code.length !== 6) { alert('Código inválido (6 letras).'); return; }
  try {
    const r = await fetch('/api/rooms/' + code + '/join', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerName: name }) });
    const d = await r.json(); if (!r.ok) { alert(d.error || 'Error.'); return; }
    MP.myId = d.playerId; MP.myName = name;
    MP.roomId = d.roomId; MP.roomCode = d.code;
    MP.isHost = false; MP.isSpectator = !!d.isSpectator;
    MP.roomPlayers = d.room.players;
    saveSession(); connectWS(); MP.screen = 'lobby'; renderAll();
  } catch (e) { alert('Error: ' + e.message); }
}
async function doToggleSpectator() {
  const r = await fetch('/api/rooms/' + MP.roomId + '/toggle-spectator', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: MP.myId }) });
  const d = await r.json(); if (!r.ok) { alert(d.error); return; }
  MP.isSpectator = !MP.isSpectator; MP.roomPlayers = d.room.players; saveSession(); renderAll();
}
async function doAddBot() {
  const r = await fetch('/api/rooms/' + MP.roomId + '/add-bot', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: MP.myId }) });
  const d = await r.json(); if (!r.ok) { alert(d.error); return; }
  MP.roomPlayers = d.room.players; renderAll();
}
async function doRemoveBot(botId) {
  const r = await fetch('/api/rooms/' + MP.roomId + '/remove-bot', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: MP.myId, botId }) });
  const d = await r.json(); if (!r.ok) { alert(d.error); return; }
  MP.roomPlayers = d.room.players; renderAll();
}
function copyCode() {
  navigator.clipboard?.writeText(MP.roomCode || '');
  const el = document.querySelector('.room-code');
  if (el) { el.style.borderColor = 'var(--g)'; setTimeout(() => el.style.borderColor = '', 1200); }
}
function doStartGame() {
  if (!MP.isHost) return;
  const activePlayers = MP.roomPlayers.filter(p => !p.isSpectator);
  if (activePlayers.length < 2) { alert('Se necesitan al menos 2 jugadores activos.'); return; }
  const newG = buildInitialG(activePlayers);
  G = newG; appLog = G.log || []; MP.screen = 'game';
  wsSend('start_game', { gameState: G });
  renderAll();
}
function goLobby() {
  document.getElementById('modal-ov').style.display = 'none';
  G = null; MP.screen = 'lobby'; appLog = []; MP.hints = [];
  resetLocalState();
  renderAll();
}

// ─── BUILD INITIAL GAME STATE ───────────────────────────────────────────────
function buildInitialG(activePlayers) {
  const n = activePlayers.length;
  let bombs = buildBombDeck(), cables = buildCableDeck(n);
  let players = activePlayers.map(rp => ({
    id: rp.id, name: rp.name, isHuman: !rp.isBot, isBot: !!rp.isBot,
    bomb: bombs.shift(), bombDefused: false, hand: [],
  }));
  let numPub = n + 1, pubQ = [];
  for (let i = 0; i < numPub; i++) pubQ.push(bombs.shift());
  let timeDeck = [...bombs], gameDeck = [...cables];
  for (let b of pubQ) { let pos = Math.floor(Math.random() * (gameDeck.length - 4) + 4); gameDeck.splice(pos, 0, b); }
  for (let p of players) for (let i = 0; i < 4; i++) p.hand.push(gameDeck.shift());
  let faults = buildFaultCards();
  let fs = Math.floor(gameDeck.length / (faults.length + 1));
  for (let i = 0; i < faults.length; i++) {
    let pos = fs * (i + 1) + Math.floor((Math.random() - .5) * Math.max(1, fs / 3));
    pos = Math.max(3, Math.min(gameDeck.length - 1, pos));
    gameDeck.splice(pos, 0, faults[i]);
  }
  let special = pickSpecial(n);
  let spMin = Math.floor(gameDeck.length * .65), spMax = Math.floor(gameDeck.length * .75);
  gameDeck.splice(spMin + Math.floor(Math.random() * (spMax - spMin)), 0, special);
  const snap = [...gameDeck].map(c => c.label || c.id || c.color);
  return {
    numPlayers: n, players, maxHand: 8,
    currentTurn: 0, phase: 'action', actionsDone: 0, maxActions: 3,
    passCardDone: false, skipClock: false,
    gameDeck, timeDeck, timeLeft: timeDeck.length,
    clockDouble: false, discard: [], publicBombs: [], specialBomb: null, specialFailed: false,
    log: [{ msg: 'Partida iniciada — ' + n + ' agentes.', cls: 'lo', ts: Date.now() }],
    turnHistory: [], initialDeckSnapshot: snap, startTime: Date.now(),
    // ── UI state (kept on G so all clients stay in sync) ──
    selectedCards: [], crisisOwnSelected: [], faultSelected: [],
    discardSelected: [], discardMode: false, discardCount: 0,
    crisisMode: false, crisisBomb: null, crisisStealer: null,
    faultRound: false, faultOrder: [], faultRoundIdx: 0,
    faultContrib: [], faultPending: 0, faultMode: null,
    faultConsult: false, faultConsultColor: null,
    faultConsultReplies: [], faultConsultDone: false, faultFromEffect: false,
    passCardMode: false, passCardIdx: null, passCardTarget: null,
    passCardDone: false,
    hintText: '',
  };
}

// ─── WHO AM I ───────────────────────────────────────────────────────────────
function mpMyPlayer() { return G?.players.find(p => p.id === MP.myId) || null; }
function mpIsMyTurn() {
  if (!G || MP.isSpectator) return false;
  return G.players[G.currentTurn]?.id === MP.myId;
}

// ─── OVERRIDE: push state to server after every action ─────────────────────
// The base game uses local render(); we intercept that to also push
const _baseRender = render;
function render() { _baseRender(); }

// ─── END GAME WITH LOG ─────────────────────────────────────────────────────
function endGameMP(type, title, msg) {
  const logData = {
    result: type, message: msg, title,
    players: G?.players?.map(p => p.name) || [],
    initialDeckSnapshot: G?.initialDeckSnapshot || [],
    turnHistory: G?.turnHistory || [],
    startTime: G?.startTime || Date.now(),
    endTime: Date.now(),
    log: appLog,
  };
  wsSend('end_game', { result: type, message: msg, logData });
  document.getElementById('m-title').className = 'mtitle ' + type;
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-msg').textContent = msg;
  document.getElementById('m-btns').innerHTML =
    '<button class="btn primary" onclick="goLobby()">▶ VOLVER AL LOBBY</button>' +
    '<button class="btn orange" onclick=\'generatePDFLog(' + JSON.stringify(logData).replace(/\'/g, "\'") + ')\'>📄 LOG</button>';
  document.getElementById('modal-ov').style.display = 'flex';
}

function generatePDFLog(data) {
  if (typeof data === 'string') { try { data = JSON.parse(data); } catch { return; } }
  const dur = fmtMs((data.endTime || Date.now()) - (data.startTime || Date.now()));
  const rc = data.result === 'win' ? '#00ff88' : '#ff2244';
  const rl = data.result === 'win' ? '✓ VICTORIA' : '✗ DERROTA';
  const tR = (data.turnHistory || []).map((t, i) =>
    '<tr style="background:' + (i % 2 === 0 ? '#0a1a0d' : '#061009') + '">' +
    '<td style="padding:5px 10px;color:#336644">' + (i + 1) + '</td>' +
    '<td style="padding:5px 10px;color:#00ff88">' + t.player + '</td>' +
    '<td style="padding:5px 10px;color:#88ffaa">' + t.action + '</td>' +
    '<td style="padding:5px 10px;color:#ff9900;text-align:right">' + t.timeLeft + 's</td></tr>').join('');
  const dR = (data.initialDeckSnapshot || []).map((c, i) =>
    '<tr style="background:' + (i % 2 === 0 ? '#0a1a0d' : '#061009') + '">' +
    '<td style="padding:4px 10px;color:#336644;text-align:right">' + (i + 1) + '</td>' +
    '<td style="padding:4px 10px;color:#88ffaa">' + c + '</td></tr>').join('');
  const lR = (data.log || []).slice().reverse().map(l =>
    '<div style="padding:3px 0;border-bottom:1px solid #071a0d;font-size:12px;color:' +
    (l.cls === 'lo' ? '#00ff88' : l.cls === 'lb' ? '#ff2244' : l.cls === 'lm' ? '#ff88ee' : l.cls === 'li' ? '#00aaff' : l.cls === 'lw' ? '#ff9900' : '#336644') +
    '">&gt; ' + l.msg + '</div>').join('');
  const html = '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Log — Código: Último Segundo</title>' +
    '<style>@import url("https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap");' +
    '*{margin:0;padding:0;box-sizing:border-box}body{background:#020c06;color:#88ffaa;font-family:"Share Tech Mono",monospace;padding:30px}' +
    'h1{font-family:"Orbitron",monospace;font-size:28px;color:#00ff88;letter-spacing:4px;margin-bottom:6px}' +
    'h2{font-family:"Orbitron",monospace;font-size:13px;color:#336644;letter-spacing:3px;margin:24px 0 10px;border-bottom:1px solid #00551a;padding-bottom:6px}' +
    'table{width:100%;border-collapse:collapse;font-size:13px}th{background:#071a0d;color:#336644;padding:6px 10px;text-align:left;font-size:11px;letter-spacing:2px}</style></head><body>' +
    '<h1>CÓDIGO: ÚLTIMO SEGUNDO</h1>' +
    '<p style="font-size:13px;color:#336644;margin-bottom:20px">Registro de partida — ' + (data.players || []).join(', ') + '</p>' +
    '<div style="background:#040f08;border:1px solid #00551a;border-radius:4px;padding:16px 20px;margin-bottom:24px;display:flex;gap:30px;flex-wrap:wrap">' +
    '<div><div style="font-size:10px;color:#336644;letter-spacing:2px">RESULTADO</div><div style="font-family:Orbitron,monospace;font-size:22px;color:' + rc + ';margin-top:4px">' + rl + '</div></div>' +
    '<div><div style="font-size:10px;color:#336644;letter-spacing:2px">DURACIÓN</div><div style="font-size:18px;color:#88ffaa;margin-top:4px">' + dur + '</div></div>' +
    '<div><div style="font-size:10px;color:#336644;letter-spacing:2px">TURNOS</div><div style="font-size:18px;color:#88ffaa;margin-top:4px">' + (data.turnHistory || []).length + '</div></div>' +
    '</div><h2>SECUENCIA DE TURNOS</h2><table><thead><tr><th>#</th><th>JUGADOR</th><th>ACCIÓN</th><th>TIEMPO</th></tr></thead><tbody>' + tR + '</tbody></table>' +
    '<h2>LOG DE PARTIDA</h2><div style="background:#040f08;border:1px solid #00551a;border-radius:4px;padding:12px 16px">' + lR + '</div>' +
    '<h2>MAZO INICIAL (después del reparto)</h2><table><thead><tr><th>POS</th><th>CARTA</th></tr></thead><tbody>' + dR + '</tbody></table>' +
    '<div style="margin-top:30px;font-size:10px;color:#336644;text-align:center">Código: Último Segundo — ' + new Date(data.startTime || Date.now()).toLocaleString() + '</div>' +
    '</body></html>';
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'log-cus-' + Date.now() + '.html';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function fmtMs(ms) { const s = Math.floor(ms / 1000), m = Math.floor(s / 60); return m + 'm ' + (s % 60) + 's'; }

// ─── LOBBY & SPECTATOR UI ───────────────────────────────────────────────────
function renderAll() {
  const root = document.getElementById('root');
  if (!root) return;
  if (MP.screen === 'landing') { root.innerHTML = buildLandingUI(); return; }
  if (MP.screen === 'lobby') { root.innerHTML = buildLobbyUI(); return; }
  if (MP.screen === 'game') {
    // In multiplayer mode, we override the base game's concept of "cur" player
    // Spectators see all cards face-up; non-active players see backs
    buildMPGameUI(root);
  }
}

function wsColor() {
  return MP.wsStatus === 'connected' ? 'var(--g)' : MP.wsStatus === 'connecting' ? 'var(--orange)' : 'var(--r)';
}
function wsDot() { return MP.wsStatus === 'connected' ? '●' : '○'; }
