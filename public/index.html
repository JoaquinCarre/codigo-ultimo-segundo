    '<div class="lobby-panel"><div class="ptitle">CREAR SALA</div>' +
    '<input class="field" id="inp-name" type="text" maxlength="20" placeholder="Tu nombre de agente..." style="margin-bottom:10px">' +
    '<button class="btn primary" style="width:100%" onclick="doCreate()">+ CREAR NUEVA SALA</button></div>' +
    '<div class="lobby-panel"><div class="ptitle">UNIRSE A SALA</div>' +
    '<input class="field" id="inp-name2" type="text" maxlength="20" placeholder="Tu nombre de agente..." style="margin-bottom:8px">' +
    '<input class="field" id="inp-code" type="text" maxlength="6" placeholder="Código (6 letras)..." style="margin-bottom:10px;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">' +
    '<button class="btn blue-btn" style="width:100%" onclick="doJoin()">→ UNIRSE A SALA</button></div>' +
    '<div style="font-size:10px;color:var(--txd);line-height:1.8;text-align:center">' +
    '<span style="color:var(--g)">🔴</span> Rojo congela el reloj &nbsp;|&nbsp; <span style="color:var(--g)">🟢</span> Verde roba 2 &nbsp;|&nbsp; <span style="color:var(--g)">🔵</span> Azul ve 3 próximas<br>' +
    '<span style="color:#ff88ee">★ La Bomba Especial está oculta. Si falla, el reloj va al doble.</span></div></div>';
}

function buildLobbyUI() {
  const players = MP.roomPlayers || [];
  const active = players.filter(p => !p.isSpectator);
  const specs = players.filter(p => p.isSpectator);
  const bots = active.filter(p => p.isBot);
  const wsStatus = '<span style="font-size:9px;font-family:Orbitron,monospace;letter-spacing:2px;color:' + wsColor() + '">' + wsDot() + ' ' + MP.wsStatus.toUpperCase() + '</span>';

  let html = '<div style="max-width:520px;margin:20px auto;padding:0 16px">' +
    '<div class="lobby-panel">' +
    '<div class="ptitle">CÓDIGO DE SALA &nbsp;' + wsStatus + '</div>' +
    '<div class="room-code" onclick="copyCode()" title="Toca para copiar">' + (MP.roomCode || '——') + '</div>' +
    '<div style="font-size:11px;color:var(--txd);text-align:center;margin-bottom:14px">Tocá para copiar y compartir con tu equipo</div>' +
    '<div class="ptitle">JUGADORES ACTIVOS (' + active.length + '/6)</div>';

  for (const pl of active) {
    html += '<div class="player-item">' +
      '<div class="dot ' + (pl.connected || pl.isBot ? 'on' : 'off') + '"></div>' +
      (pl.isBot ? '<span class="spec-badge" style="border-color:var(--orange);color:var(--orange)">BOT</span>' : '') +
      '<span style="color:' + (pl.id === MP.myId ? 'var(--g)' : 'var(--txt)') + ';flex:1">' + pl.name + (pl.isHost ? ' ★' : '') + '</span>' +
      (pl.id === MP.myId ? '<span style="font-size:9px;color:var(--txd)">(vos)</span>' : '') +
      (MP.isHost && pl.isBot ? `<button class="btn danger" style="font-size:9px;padding:2px 7px;margin-left:4px" onclick="doRemoveBot('${pl.id}')">✕</button>` : '') +
      '</div>';
  }

  if (specs.length > 0) {
    html += '<div class="ptitle" style="margin-top:12px">ESPECTADORES (' + specs.length + ')</div>';
    for (const pl of specs) {
      html += '<div class="player-item">' +
        '<div class="dot ' + (pl.connected ? 'on' : 'off') + '"></div>' +
        '<span class="spec-badge">ESP</span>' +
        '<span style="color:var(--b);flex:1">' + pl.name + '</span>' +
        (pl.id === MP.myId ? '<button class="btn" style="font-size:9px;padding:3px 8px" onclick="doToggleSpectator()">→ Ser jugador</button>' : '') +
        '</div>';
    }
  }

  if (MP.isHost) {
    html += '<div class="brow" style="margin-top:14px">' +
      '<button class="btn primary" onclick="doStartGame()" ' + (active.length < 2 ? 'disabled' : '') + '>▶ INICIAR</button>' +
      (active.length < 6 ? '<button class="btn orange" onclick="doAddBot()">🤖 + BOT</button>' : '') +
      '<span style="font-size:10px;color:var(--txd);margin-left:6px">Mín 2 activos</span>' +
      '</div>';
  } else if (!MP.isSpectator) {
    html += '<div class="brow" style="margin-top:12px">' +
      '<button class="btn" onclick="doToggleSpectator()">👁 Ser espectador</button></div>';
  }

  if (MP.isSpectator) {
    html += '<div style="font-size:11px;color:var(--b);margin-top:12px;text-align:center">Sos espectador. Si hay lugar, podés unirte como jugador activo.</div>';
  }
  html += '<div style="font-size:11px;color:var(--txd);margin-top:10px;text-align:center">Esperando que el host inicie la partida...</div>';

  if (appLog.length > 0) {
    html += '<div class="panel" style="margin-top:12px"><div class="ptitle">LOG</div><div class="log-area">' +
      appLog.slice(0, 5).map(l => '<div class="' + l.cls + '">&gt; ' + l.msg + '</div>').join('') + '</div></div>';
  }

  html += '</div></div>';
  return html;
}

function buildMPGameUI(root) {
  if (!G) return;
  // Determine if it is my turn
  const isMyTurn = mpIsMyTurn();
  const myPl = mpMyPlayer();
  const curPl = G.players[G.currentTurn];
  const wsIndicator = '<span style="font-size:9px;color:' + wsColor() + ';margin-left:8px">' + wsDot() + '</span>';

  // We call the base render into root, then inject spectator-specific UI
  // and add websocket indicator to the phase bar
  // Actually we need to build the full UI — let's use the existing buildUI() from the base game
  // but we need to override: whose hand is visible, and add MP controls

  // Override G temporarily so the base render sees MP context
  const savedCurrentTurn = G.currentTurn;

  // Let base game render
  root.innerHTML = buildMPUI();
  updateTimer();
}

// Wrapper around base buildUI that adds MP features
function buildMPUI() {
  if (!G) return '';
  const isMyTurn = mpIsMyTurn();
  const myPl = mpMyPlayer();
  const curPl = G.players[G.currentTurn];

  // Phase bar
  const ph = G.phase;
  const phSteps = ['action', 'draw', 'hint'];
  const phLabels = ['ACCIÓN', 'ROBO', 'PISTA'];
  const phBar = '<div class="pbar">' +
    phSteps.map((s, i) =>
      '<span class="pstep ' + (s === ph ? 'active' : phSteps.indexOf(ph) > i ? 'done' : '') + '">' + phLabels[i] + '</span>' +
      (i < 2 ? '<span style="color:var(--bor)">→</span>' : '')).join('') +
    '<span style="flex:1"></span>' +
    (MP.isSpectator ? '<span class="sbadge" style="border:1px solid var(--bd);color:var(--b)">ESPECTADOR</span>' : '') +
    '<span class="sbadge ' + (isMyTurn && !MP.isSpectator ? 'bg' : 'by') + '" style="margin-left:4px">' +
    (isMyTurn && !MP.isSpectator ? 'TU TURNO' : curPl?.name || '—') + '</span>' +
    (G.clockDouble ? '<span class="sbadge" style="border:1px solid #ff00cc;color:#ff00cc;margin-left:4px">RELOJ ×2 ☢</span>' : '') +
    '<span style="font-size:9px;color:' + wsColor() + ';margin-left:8px">' + wsDot() + '</span>' +
    '</div>';

  // Time bar
  const max = Math.max(G.timeDeck.length + G.discard.length, G.timeLeft, 1);
  const pct = Math.max(0, Math.min(100, (G.timeLeft / max) * 100));
  const tcol = pct > 50 ? 'var(--g)' : pct > 25 ? 'var(--orange)' : 'var(--r)';
  const tBar = '<div class="tbar">' +
    '<span style="font-family:Orbitron,monospace;font-size:9px;color:var(--txd);letter-spacing:2px">TIEMPO</span>' +
    '<div class="ttrack"><div id="tfill" style="width:' + pct + '%;background:' + tcol + ';height:100%"></div></div>' +
    '<span id="tcnt" class="tcnt" style="color:' + tcol + '">' + G.timeLeft + '</span>' +
    '<span style="font-size:10px;color:var(--txd)">SEG</span>' +
    (G.skipClock ? '<span style="font-size:10px;color:var(--r);margin-left:8px;border:1px solid var(--rd);padding:1px 7px;border-radius:2px">🔴 CONGELADO</span>' : '') +
    '<span style="font-size:10px;color:var(--txd);margin-left:12px">MAZO: <span style="color:var(--txt)">' + G.gameDeck.length + '</span></span>' +
    '<span style="font-size:10px;color:var(--txd)">OCULTAS: <span style="color:var(--txt)">' + G.gameDeck.filter(c => c.type === 'bomb' || c.type === 'special').length + '</span></span>' +
    '</div>';

  // Hints log
  const hintsH = MP.hints.length > 0 ?
    '<div style="font-size:10px;color:var(--txd);margin-bottom:8px;padding:6px 10px;background:rgba(0,255,136,.03);border-radius:4px;border:1px solid var(--bor)">💬 ' +
    MP.hints.slice(-5).map(h => '<span style="color:var(--g)">' + h.playerName + '</span>: "' + h.text + '"').join(' → ') + '</div>' : '';

  // Player panels — MP aware
  let panels = '';
  for (const pl of G.players) {
    const isActive = G.currentTurn === G.players.indexOf(pl);
    const isMe = pl.id === MP.myId && !MP.isSpectator;
    const isFaultActor = G.faultRound && G.faultOrder && G.faultOrder[G.faultRoundIdx || 0] === G.players.indexOf(pl);

    let handHTML = '';
    if (isMe) {
      // My hand — interactive (handled by base game selectCard)
      handHTML = buildMyHandHTML(pl);
    } else if (MP.isSpectator) {
      // Spectator sees ALL hands face up
      handHTML = pl.hand.map(card => {
        const col = card.type === 'fault' ? 'fault' : card.type === 'bomb' ? 'bomb-c' : card.type === 'special' ? 'special-c' : card.color;
        const icon = CI[card.type] || CI[card.color] || '■';
        return '<div class="card ' + col + '" style="cursor:default"><div class="cicon">' + icon + '</div>' +
          '<div class="clbl">' + (card.label || card.color || '').substring(0, 7) + '</div></div>';
      }).join('');
    } else {
      // Other players — show backs
      handHTML = pl.hand.map(() => '<div class="cback" style="cursor:default">?</div>').join('');
    }

    const bombDisp = pl.bombDefused ?
      '<span style="color:var(--g);font-size:10px;margin-top:4px;display:block">✓ DESACTIVADA</span>' :
      '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">' + reqHTML(pl.bomb) + '</div>';

    let actionBtns = '';
    if (isMe && isMyTurn && !G.crisisMode && !G.faultRound && !G.discardMode && !G.passCardMode) {
      actionBtns = buildActionBtns(pl, ph);
    }

    panels += '<div class="panel" style="border-color:' + (isActive ? 'var(--orange)' : 'var(--bor)') + '">' +
      '<div class="ptitle">' + (isMe ? '👤' : pl.isBot ? '🤖' : '🎮') + ' ' + pl.name + ' (' + pl.hand.length + 'c)' +
      (isActive ? '<span class="sbadge by" style="float:right">ACTIVO</span>' : '') +
      (isMe ? '<span style="float:right;font-size:9px;color:var(--gd)">(vos)</span>' : '') +
      (pl.isBot ? '<span style="float:right;font-size:9px;color:var(--orange);margin-right:4px">BOT</span>' : '') +
      '</div><div class="hand">' + handHTML + '</div>' + actionBtns +
      '<div style="margin-top:8px;padding-top:6px;border-top:1px solid var(--bor)">' +
      '<div class="ptitle" style="margin-bottom:4px">💣 BOMBA PERSONAL</div>' +
      '<div class="btier ' + pl.bomb.tier + '">' + pl.bomb.label + '</div>' + bombDisp +
      '</div></div>';
  }

  const gridClass = G.numPlayers <= 4 ? 'grid2' : 'grid3';

  // Special bomb slot
  const specSlot = G.specialBomb ?
    (G.specialBomb.defused ?
      '<div class="bslot defused"><div class="btier special">☢ ' + G.specialBomb.label + '</div><div style="color:var(--g);font-size:10px;margin-top:4px">✓ DESACTIVADA</div></div>' :
      '<div class="bslot special-slot"><div class="btier special">☢ ' + G.specialBomb.label + '</div><div style="margin-top:6px">' + reqHTML(G.specialBomb) + '</div>' +
      (G.clockDouble ? '<div style="color:#ff00cc;font-size:10px;margin-top:4px">⚠ RELOJ ×2</div>' : '') + '</div>') :
    '<div class="bslot" style="opacity:.4"><div class="btier special">☢ BOMBA ESPECIAL</div><div style="font-size:10px;color:var(--txd);margin-top:4px">Oculta en el mazo...</div></div>';

  const pubSlots = G.publicBombs.length > 0 ?
    G.publicBombs.map(b => b.defused ?
      '<div class="bslot defused"><div class="btier ' + b.tier + '">' + b.label + '</div><div style="color:var(--g);font-size:10px;margin-top:4px">✓ OK</div></div>' :
      '<div class="bslot active"><div class="btier ' + b.tier + '">' + b.label + '</div><div style="margin-top:5px">' + reqHTML(b) + '</div></div>').join('') :
    '<span style="font-size:11px;color:var(--txd)">Ninguna activa aún</span>';

  const logH = appLog.slice(0, 14).map(l => '<div class="' + l.cls + '">&gt; ' + l.msg + '</div>').join('');

  // Build special mode banners using base game state
  const specialBanners = buildSpecialBanners(isMyTurn, myPl);

  // Hint section
  let hintSection = '';
  if (ph === 'hint' && isMyTurn && !G.crisisMode && !G.faultRound) {
    hintSection = '<div style="background:rgba(0,255,136,.04);border:1px solid var(--gd);border-radius:4px;padding:10px 14px;margin-bottom:10px;">' +
      '<div class="ptitle" style="color:var(--gd);margin-bottom:8px">💬 PISTA VERBAL — avanza el turno automáticamente</div>' +
      '<div style="font-size:10px;color:var(--txd);margin-bottom:8px">Una palabra: color, cantidad o cualidad abstracta</div>' +
      '<div style="display:flex;gap:8px;align-items:center">' +
      '<input class="hint-input" id="hint-in" type="text" maxlength="20" placeholder="Ej: Verde, Tres, Listo..." ' +
      'oninput="G.hintText=this.value" onkeydown="if(event.key===\'Enter\')doSubmitHint()">' +
      '<button class="btn primary" onclick="doSubmitHint()">→ DAR Y AVANZAR</button></div></div>';
  } else if (ph === 'hint' && !isMyTurn && !G.crisisMode && !G.faultRound) {
    hintSection = '<div style="background:rgba(0,255,136,.04);border:1px dashed var(--gd);border-radius:4px;padding:8px 14px;margin-bottom:10px;font-size:11px;color:var(--txd)">💬 ' +
      (curPl?.name || '?') + ' está escribiendo su pista...</div>';
  }

  return phBar + tBar + specialBanners + hintSection + hintsH +
    '<div class="' + gridClass + '" style="margin-bottom:10px">' + panels + '</div>' +
    '<div class="panel" style="margin-bottom:10px">' +
    '<div class="ptitle">☢ ESPECIAL &amp; 🌐 PÚBLICAS (' + G.publicBombs.filter(b => !b.defused).length + ' pendientes)</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:8px">' + specSlot + '&nbsp;' + pubSlots + '</div></div>' +
    '<div class="panel"><div class="ptitle">📡 LOG</div><div class="log-area">' + logH + '</div></div>';
}

function buildMyHandHTML(pl) {
  const selArr = G.discardMode ? (G.discardSelected || []) :
    G.faultRound ? (G.faultSelected || []) :
    G.passCardMode ? [] : (G.selectedCards || []);
  return pl.hand.map((card, i) => {
    const sel = selArr.includes(i);
    const isPH = G.passCardMode && G.passCardIdx === i;
    const col = card.type === 'fault' ? 'fault' : card.type === 'bomb' ? 'bomb-c' : card.type === 'special' ? 'special-c' : card.color;
    const icon = CI[card.type] || CI[card.color] || '■';
    let dim = '';
    if (G.faultRound && card.type === 'cable') {
      const fSel = G.faultSelected || [];
      const first = fSel.length > 0 ? pl.hand[fSel[0]] : null;
      if (first && card.color !== first.color) dim = 'opacity:.3;pointer-events:none;';
    }
    const dSel = G.discardSelected || [];
    if (G.discardMode && !sel && dSel.length > 0) dim = 'opacity:.5;';
    return '<div class="card ' + col + ' ' + (sel ? 'selected' : '') + ' ' + (isPH ? 'pass-hi' : '') + '" style="' + dim + '" onclick="selectCard(' + i + ')" title="' + (card.label || '') + '">' +
      '<div class="cicon">' + icon + '</div><div class="clbl">' + (card.label || card.color || '').substring(0, 7) + '</div></div>';
  }).join('');
}

function buildActionBtns(pl, ph) {
  const canDefPers = !pl.bombDefused && canDefuse(pl.hand, pl.bomb);
  const canDefSpec = G.specialBomb && !G.specialBomb.defused && canDefuse(pl.hand, G.specialBomb);
  const canUse = (G.selectedCards || []).length > 0 && G.actionsDone < G.maxActions;
  const canAct = G.actionsDone < G.maxActions;
  const canPass = !G.passCardDone && pl.hand.length > 0 && G.players.some(p => p.id !== MP.myId);
  if (ph === 'action') {
    let btns = '<div class="brow">' +
      (canDefPers && canAct ? '<button class="btn primary" onclick="doDefusePersonal()">💣 PERSONAL</button>' : '') +
      (canDefSpec && canAct ? '<button class="btn" style="border-color:#ff00cc;color:#ff88ee" onclick="doDefuseSpecial()">☢ ESPECIAL</button>' : '') +
      (canUse ? '<button class="btn" onclick="doUseEffect()">⚡ EFECTO (' + G.actionsDone + '/' + G.maxActions + ')</button>' : '') +
      (canPass ? '<button class="btn orange" onclick="doStartPassCard()">🤝 DAR CARTA</button>' : '') +
      '<button class="btn" onclick="doSkipToDraw()">→ ROBAR</button></div>';
    G.publicBombs.forEach((b, i) => {
      if (!b.defused && canAct && canDefuse(pl.hand, b))
        btns += '<button class="btn warn" style="font-size:9px;padding:4px 8px;margin-top:4px" onclick="doDefusePublic(' + i + ')">' + b.label + '</button>';
    });
    return btns;
  }
  if (ph === 'draw') return '<div class="brow"><button class="btn primary" onclick="doDrawCard()">↓ ROBAR CARTA</button></div>';
  return '';
}

function buildSpecialBanners(isMyTurn, myPl) {
  let out = '';
  // Pass card mode
  if (G.passCardMode && isMyTurn) {
    const others = G.players.filter(p => p.id !== MP.myId);
    const sc = myPl && G.passCardIdx !== null ? myPl.hand[G.passCardIdx] : null;
    out += '<div class="pass-box">🤝 DAR CARTA — seleccioná la carta (brilla naranja) y luego el destinatario.' +
      '<div style="margin:8px 0;font-size:11px">Carta: ' + (sc ? '<span style="color:var(--' + (sc.color === 'white' ? 'w' : sc.color) + ')">' + sc.label + '</span>' : '<span style="color:var(--txd)">ninguna</span>') + '</div>' +
      `<div class="brow">` + others.map(pl => `<button class="btn ${G.passCardTarget === pl.id ? 'primary' : ''}" onclick="doSelectPassTarget('${pl.id}')">${pl.name}</button>`).join('') +
      '<button class="btn primary" onclick="doConfirmPassCard()" ' + (!sc || !G.passCardTarget ? 'disabled' : '') + '>✓ DAR</button>' +
      '<button class="btn danger" onclick="doCancelPassCard()">✕</button></div></div>';
  }
  // Discard
  if (G.discardMode && isMyTurn && myPl) {
    const sel = (G.discardSelected || []).map(i => myPl.hand[i]).filter(Boolean);
    out += '<div class="discard-box">✋ MANO LLENA — elegí ' + G.discardCount + ' carta(s) para descartar.' +
      '<div style="margin:6px 0">Seleccionadas: ' + (sel.map(c => '<span style="color:var(--' + (c.color === 'white' ? 'w' : c.color) + ')">' + c.label + '</span>').join(', ') || '—') + '</div>' +
      '<div class="brow"><button class="btn warn" onclick="doConfirmDiscard()" ' + ((G.discardSelected || []).length < G.discardCount ? 'disabled' : '') + '>✓ DESCARTAR (' + (G.discardSelected || []).length + '/' + G.discardCount + ')</button></div></div>';
  }
  // Crisis
  if (G.crisisMode && G.crisisBomb) {
    const stealer = G.players.find(p => p.id === G.crisisStealer);
    const iAmStealer = stealer?.id === MP.myId && !MP.isSpectator;
    const other = G.players.find(p => p.id !== stealer?.id);
    const ownCards = iAmStealer && (G.crisisOwnSelected || []).length > 0 ? (G.crisisOwnSelected || []).map(i => stealer.hand[i]).filter(Boolean) : [...(stealer?.hand || [])];
    const stolen = other ? (G.selectedCards || []).map(i => other.hand[i]).filter(Boolean) : [];
    const combined = [...ownCards, ...stolen];
    const possible = canDefuse(combined, G.crisisBomb);
    const isSpec = G.crisisBomb.type === 'special';
    const stealH = other ? other.hand.map((_, i) => iAmStealer ?
      '<div class="cback ' + ((G.selectedCards || []).includes(i) ? 'sel' : '') + '" onclick="selectAICard(' + i + ')">?</div>' :
      '<div class="cback">?</div>').join('') : '';
    const ownH = iAmStealer && stealer ? stealer.hand.map((card, i) => {
      const s = (G.crisisOwnSelected || []).includes(i);
      const col = card.type === 'fault' ? 'fault' : card.type === 'bomb' ? 'bomb-c' : card.type === 'special' ? 'special-c' : card.color;
      const dim = (!s && (G.crisisOwnSelected || []).length > 0) ? 'opacity:.5;' : '';
      return '<div class="card ' + col + ' ' + (s ? 'selected' : '') + '" style="' + dim + '" onclick="selectCard(' + i + ')">' +
        '<div class="cicon">' + (CI[card.type] || CI[card.color] || '■') + '</div>' +
        '<div class="clbl">' + (card.label || card.color || '').substring(0, 7) + '</div></div>';
    }).join('') : '';
    out += '<div class="' + (isSpec ? 'special-box' : 'crisis-box') + '">' +
      (isSpec ? '☢' : '💣') + ' ¡CRISIS! <strong>' + G.crisisBomb.label + '</strong> — ' + reqHTML(G.crisisBomb) + '<br>' +
      '<span style="font-size:10px;opacity:.8">Solo anunciar colores (sin cantidades).' + (isSpec ? ' ¡Esta es la Bomba Especial!' : '') + '</span>' +
      (iAmStealer ? '<div style="margin:8px 0 4px;font-size:10px">1. Tus cartas (vacío = usar todas):</div>' +
        '<div class="hand" style="margin-bottom:8px">' + ownH + '</div>' +
        '<div style="font-size:10px;margin:4px 0">2. Robá 1-2 a ciegas de ' + (other ? other.name : 'compañero') + ':</div>' +
        '<div class="hand" style="margin:6px 0">' + stealH + '</div>' +
        '<div class="brow">' +
        '<button class="btn primary" onclick="doCrisisAttempt()">⚡ DESACTIVAR ' + (possible ? '(POSIBLE)' : '(RIESGO)') + '</button>' +
        '<button class="btn" onclick="doCrisisAdopt()">Adoptar para después</button></div>' :
        '<div style="font-size:11px;margin-top:8px;color:var(--txd)">' + (stealer?.name || '') + ' está robando a ciegas...</div>' +
        '<div class="hand" style="margin:6px 0">' + stealH + '</div>') + '</div>';
  }
  // Fault
  if (G.faultRound && G.faultMode) {
    const actIdx = G.faultOrder ? G.faultOrder[G.faultRoundIdx || 0] : 0;
    const actPl = G.players[actIdx];
    const isMySlot = actPl?.id === MP.myId && !MP.isSpectator;
    const cBar = (G.faultOrder || []).map((pidIdx, i) => {
      const pl = G.players[pidIdx];
      const contrib = (G.faultContrib || []).find(c => c.playerIdx === pidIdx);
      const status = contrib ? '✓ ' + contrib.count + 'c' : i === (G.faultRoundIdx || 0) ? '⬅ AHORA' : '...';
      const col = contrib ? 'var(--gd)' : i === (G.faultRoundIdx || 0) ? 'var(--orange)' : 'var(--txd)';
      return '<span style="color:' + col + ';font-size:10px">' + (pl?.name || '?') + ': ' + status + '</span>';
    }).join(' &nbsp;|&nbsp; ');
    let cH = '';
    if (isMySlot) {
      const isDrawer = (G.faultRoundIdx || 0) === 0;
      const fSel = (G.faultSelected || []).map(i => myPl?.hand[i]).filter(Boolean);
      cH = '<span style="font-size:10px;color:var(--orange)">Tu turno — seleccioná' + (isDrawer ? ' al menos 1' : '') + ' cable(s) del mismo color.</span>' +
        (fSel.length > 0 ? '<div style="font-size:10px;margin-top:5px">→ ' + fSel.map(c => '<span style="color:var(--' + c.color + ')">' + c.label + '</span>').join(', ') + '</div>' : '') +
        '<div class="brow"><button class="btn warn" onclick="doFaultContrib()">' + (G.faultSelected?.length > 0 ? 'Aportar ' + G.faultSelected.length : 'Aportar 0') + '</button>' +
        (!isDrawer ? '<button class="btn" onclick="doFaultPass()">Pasar (0)</button>' : '') + '</div>';
    } else {
      cH = '<span style="font-size:10px;color:var(--txd)">' + (actPl ? actPl.name + ' está decidiendo...' : 'Esperando...') + '</span>';
    }
    out += '<div class="fault-box">⚡ FALLA — 3 cables del mismo color &nbsp;|&nbsp; Faltan: <strong>' + (G.faultPending || 0) + '</strong>/3' +
      '<div style="margin:5px 0 4px;font-size:10px">' + cBar + '</div>' + cH + '</div>';
  }
  return out;
}

// ═══════════════════════════════════════════════════════════════════════════
// OVERRIDES — adapt base game functions to multiplayer context
// ═══════════════════════════════════════════════════════════════════════════

// Base game uses G directly; in MP mode we push after every action
function mpWrap(fn) {
  return function(...args) {
    if (!mpIsMyTurn() && !G.crisisMode && !G.faultRound && !G.discardMode) return;
    fn(...args);
  };
}

// Override pushGameState equivalent
function _afterAction(desc) {
  if (G) G.log = appLog.slice(0, 50);
  wsSend('game_action', { gameState: G, action: desc });
  renderAll();
}

// Override the base game's endGame
function endGame(type, title, msg) {
  endGameMP(type, title, msg);
}

// Record turn for log
function recAction(action) {
  if (!G) return;
  if (!G.turnHistory) G.turnHistory = [];
  G.turnHistory.push({ turn: G.currentTurn, player: G.players[G.currentTurn]?.name || '?', action, timeLeft: G.timeLeft, ts: Date.now() });
}

// Pass card support (added to base game G state)
function doStartPassCard() {
  G.passCardMode = true; G.passCardIdx = null; G.passCardTarget = null;
  log('🤝 Seleccioná la carta y luego el destinatario.', 'le'); renderAll();
}
function doSelectPassTarget(id) { G.passCardTarget = id; renderAll(); }
function doCancelPassCard() { G.passCardMode = false; G.passCardIdx = null; G.passCardTarget = null; renderAll(); }
function doConfirmPassCard() {
  const p = mpMyPlayer(); if (!p || G.passCardIdx === null || !G.passCardTarget) return;
  const card = p.hand[G.passCardIdx]; if (!card) { doCancelPassCard(); return; }
  const target = G.players.find(x => x.id === G.passCardTarget); if (!target) { doCancelPassCard(); return; }
  p.hand.splice(G.passCardIdx, 1); target.hand.push(card);
  if (target.hand.length > G.maxHand) target.hand = target.hand.slice(0, G.maxHand);
  G.passCardDone = true;
  log(p.name + ' → ' + target.name + ': ' + (CN[card.color] || card.color), 'lo');
  recAction(p.name + ': da ' + card.label + ' a ' + target.name);
  G.passCardMode = false; G.passCardIdx = null; G.passCardTarget = null;
  _afterAction(p.name + ' pasó una carta a ' + target.name + '.');
}

// Override selectCard to handle passCardIdx
const _baseSelectCard = selectCard;
function selectCard(idx) {
  if (G.passCardMode) { G.passCardIdx = idx; renderAll(); return; }
  _baseSelectCard(idx);
}

// ─── HINT → AUTO-ADVANCE ─────────────────────────────────────────────────
function doSubmitHint() {
  const input = document.getElementById('hint-in');
  const txt = (input?.value || G.hintText || '').trim();
  if (!txt) { log('Ingresá una palabra.', 'lw'); renderAll(); return; }
  if (txt.split(/\s+/).length > 1) { log('Solo una palabra.', 'lw'); renderAll(); return; }
  const p = mpMyPlayer();
  MP.hints.push({ playerName: p.name, text: txt });
  if (MP.hints.length > 10) MP.hints.shift();
  wsSend('hint', { text: txt });
  log(p.name + ' dice: "' + txt + '"', 'lo');
  recAction(p.name + ': pista "' + txt + '"');
  G.hintText = '';
  // Auto-advance: tick clock then next turn
  if (G.skipClock) { G.skipClock = false; log('🔴 Reloj congelado este turno.', 'lo'); }
  else { tickTime(1); if (G.timeLeft <= 0) return; }
  G.phase = 'action'; G.actionsDone = 0; G.passCardDone = false;
  G.currentTurn = (G.currentTurn + 1) % G.numPlayers;
  G.selectedCards = []; G.faultSelected = []; G.discardSelected = []; G.crisisOwnSelected = [];
  recAction('→ Turno de ' + (G.players[G.currentTurn]?.name || '?'));
  _afterAction('Turno de ' + (G.players[G.currentTurn]?.name || '?') + '.');
}

// Expose render for base game compatibility
function render() { renderAll(); }

// ─── INIT ─────────────────────────────────────────────────────────────────
(async () => {
  const restored = await tryRestore();
  if (!restored) { MP.screen = 'landing'; renderAll(); }
})();

</script>
